# System3 Risk Configuration — Pritam Warghade
# MAX DAILY LOSS: ₹5,000 (hardcoded per owner instruction 2026-07-01)
# This is the ONLY number that matters for safety.
# All other limits derived from this.

risk:
  max_daily_loss_inr: 5000          # HARD STOP — system halts when hit
  max_daily_loss_percent: 2.0        # % of capital (secondary check)
  max_per_trade_loss_inr: 1500       # Single trade max = 30% of daily limit
  max_position_size_percent: 5.0     # Max 5% of capital per position
  max_leverage: 1.0                  # No leverage
  max_drawdown_percent: 5.0

limits:
  max_trades_per_day: 5              # Conservative — paper proof first
  max_concurrent_positions: 2        # Max 2 open at once
  min_holding_period_minutes: 5
  max_holding_period_hours: 6        # Exit before market close

stops:
  use_hard_stops: true
  stop_loss_percent: 2.0
  take_profit_percent: 3.0

live_trading_gate:
  # ALL of these must be true before live trading is allowed
  min_validation_days: 10            # 10+ days of paper proof
  min_spearman_rho: 0.70             # ML accuracy gate
  paper_profit_proof_required: true  # Must show paper profit
  human_approval_required: true      # Final manual approval
  max_capital_first_live_trade: 5000 # First live trade max ₹5000

alerts:
  enable_drawdown_alerts: true
  enable_margin_alerts: true
  enable_loss_alerts: true
  alert_threshold_inr: 2500          # Alert at 50% of daily limit
