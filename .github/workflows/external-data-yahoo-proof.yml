name: External Data Yahoo Proof

on:
  workflow_dispatch:
  schedule:
    - cron: '40 3 * * 1-5'
  push:
    branches:
      - main
    paths:
      - .github/workflows/external-data-yahoo-proof.yml
      - docs/project_control/**

permissions:
  contents: write

jobs:
  external-data-yahoo-proof:
    name: Verify Yahoo Finance fallback market data
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SYSTEM3_MODE: analyzer
      ANALYZE_MODE: "1"
      LIVE_TRADING_ENABLED: "0"
      SYSTEM3_LIVE_TRADING_ALLOWED: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install data dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install yfinance pandas numpy

      - name: Fetch public Yahoo OHLC proof
        shell: bash
        run: |
          set -euo pipefail
          OUT="reports/latest/external_data_yahoo"
          rm -rf "$OUT"
          mkdir -p "$OUT"

          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          import pandas as pd
          import yfinance as yf

          symbols = [
              '^NSEI', '^NSEBANK',
              'RELIANCE.NS', 'TCS.NS', 'HDFCBANK.NS', 'ICICIBANK.NS', 'INFY.NS',
              'SBIN.NS', 'AXISBANK.NS', 'LT.NS', 'BHARTIARTL.NS', 'KOTAKBANK.NS',
              'ADANIENT.NS', 'TATAMOTORS.NS', 'BPCL.NS'
          ]

          out = Path('reports/latest/external_data_yahoo')
          out.mkdir(parents=True, exist_ok=True)
          results = []
          all_rows = []

          for symbol in symbols:
              item = {'symbol': symbol}
              try:
                  df = yf.download(symbol, period='10d', interval='1d', progress=False, auto_adjust=False, threads=False)
                  item['rows'] = int(len(df))
                  item['ok'] = len(df) > 0
                  if len(df) > 0:
                      df = df.reset_index()
                      last = df.iloc[-1].to_dict()
                      def clean(v):
                          try:
                              if pd.isna(v):
                                  return None
                          except Exception:
                              pass
                          if hasattr(v, 'isoformat'):
                              return v.isoformat()
                          try:
                              return float(v)
                          except Exception:
                              return str(v)
                      item['last_row'] = {str(k): clean(v) for k, v in last.items()}
                      for _, row in df.tail(5).iterrows():
                          rec = {'symbol': symbol}
                          for k, v in row.to_dict().items():
                              rec[str(k)] = clean(v)
                          all_rows.append(rec)
                  else:
                      item['last_row'] = None
              except Exception as exc:
                  item['ok'] = False
                  item['rows'] = 0
                  item['error'] = repr(exc)
              results.append(item)

          summary = {
              'generated_utc': datetime.now(timezone.utc).isoformat(),
              'source': 'Yahoo Finance via yfinance',
              'purpose': 'secondary public OHLC fallback proof; not authoritative for options execution',
              'symbols_requested': len(symbols),
              'symbols_ok': sum(1 for r in results if r.get('ok')),
              'symbols_failed': sum(1 for r in results if not r.get('ok')),
              'rows_total': sum(int(r.get('rows') or 0) for r in results),
              'analyzer_only': True,
              'live_trading_enabled': False,
              'results': results,
          }

          (out / 'yahoo_data_summary.json').write_text(json.dumps(summary, indent=2, sort_keys=True), encoding='utf-8')
          pd.DataFrame(all_rows).to_csv(out / 'yahoo_ohlc_tail.csv', index=False)

          lines = ['# External Data Yahoo Proof', '', f"Generated UTC: {summary['generated_utc']}", '', f"Source: `{summary['source']}`", '', f"Symbols requested: `{summary['symbols_requested']}`", f"Symbols OK: `{summary['symbols_ok']}`", f"Symbols failed: `{summary['symbols_failed']}`", f"Rows total: `{summary['rows_total']}`", '', '## Role in System3', '', '- Yahoo Finance is allowed as a fallback/secondary OHLC source.', '- It is not the final authority for options-chain execution.', '- Analyzer/Paper mode only; live trading disabled.', '', '## Symbol status', '', '| Symbol | OK | Rows |', '|---|---:|---:|']
          for r in results:
              lines.append(f"| `{r['symbol']}` | `{r.get('ok')}` | `{r.get('rows')}` |")
          (out / 'README.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

          cat "$OUT/README.md"

      - name: Commit Yahoo data proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/external_data_yahoo
          if git diff --cached --quiet; then
            echo "No Yahoo data proof changes to commit."
          else
            git commit -m "audit: publish Yahoo external data proof"
            git push
          fi
