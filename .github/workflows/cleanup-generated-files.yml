name: Cleanup Generated Files

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-generated-files.yml

permissions:
  contents: write

jobs:
  cleanup-generated-files:
    name: Remove tracked generated files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove generated files only
        shell: bash
        run: |
          set -euo pipefail
          git rm -r --ignore-unmatch --cached audit_artifacts || true
          git rm -r --ignore-unmatch **/__pycache__ || true
          git rm --ignore-unmatch $(git ls-files '*.pyc' 2>/dev/null) || true
          git rm --ignore-unmatch $(git ls-files 'desktop.ini' '**/desktop.ini' 2>/dev/null) || true
          git rm --ignore-unmatch $(git ls-files '.DS_Store' '**/.DS_Store' 2>/dev/null) || true

      - name: Commit cleanup if needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo "No tracked generated files found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "cleanup: remove tracked generated files"
          git push

      - name: Cleanup proof
        shell: bash
        run: |
          set -euo pipefail
          echo "Generated cleanup completed."
          echo "Remaining tracked pyc files:"
          git ls-files '*.pyc' || true
          echo "Remaining tracked desktop.ini files:"
          git ls-files 'desktop.ini' '**/desktop.ini' || true
