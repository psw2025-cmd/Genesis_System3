name: Cleanup Generated Files

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-generated-files.yml

permissions:
  contents: write

jobs:
  cleanup-generated-files:
    name: Remove tracked generated files
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove generated files only
        shell: bash
        run: |
          set -euo pipefail
          git ls-files > /tmp/tracked_files.txt
          grep -E '(^|/)audit_artifacts/' /tmp/tracked_files.txt > /tmp/remove_files.txt || true
          grep -E '(^|/)__pycache__/' /tmp/tracked_files.txt >> /tmp/remove_files.txt || true
          grep -E '\.pyc$' /tmp/tracked_files.txt >> /tmp/remove_files.txt || true
          grep -E '(^|/)desktop\.ini$' /tmp/tracked_files.txt >> /tmp/remove_files.txt || true
          grep -E '(^|/)\.DS_Store$' /tmp/tracked_files.txt >> /tmp/remove_files.txt || true
          sort -u /tmp/remove_files.txt -o /tmp/remove_files.txt
          echo "Files selected for generated-file removal:"
          cat /tmp/remove_files.txt || true
          if [ -s /tmp/remove_files.txt ]; then
            xargs -a /tmp/remove_files.txt -r git rm --cached --ignore-unmatch --
          fi

      - name: Commit cleanup if needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --cached --quiet; then
            echo "No tracked generated files found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "cleanup: remove tracked generated files"
          git push

      - name: Cleanup proof
        shell: bash
        run: |
          set -euo pipefail
          echo "Generated cleanup completed."
          echo "Remaining tracked generated files:"
          git ls-files | grep -E '(^|/)audit_artifacts/|(^|/)__pycache__/|\.pyc$|(^|/)desktop\.ini$|(^|/)\.DS_Store$' || true
