name: System3 Auto Verifier

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - render.yaml
      - dashboard/backend/**
      - .github/workflows/**
      - Run-FullQA.ps1
      - .gitignore

permissions:
  contents: read

jobs:
  auto-verifier:
    name: System3 auto verification proof
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build verification artifact
        shell: bash
        run: |
          set -euo pipefail
          OUT="audit_artifacts/system3_auto_verifier_$(date -u +%Y%m%dT%H%M%SZ)"
          mkdir -p "$OUT"
          echo "OUT=$OUT" >> "$GITHUB_ENV"

          {
            echo "# System3 Auto Verifier"
            echo "Generated UTC: $(date -u --iso-8601=seconds)"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Branch: ${GITHUB_REF_NAME:-unknown}"
            echo "Mode: proof-only, no broker login, no orders, no live trading"
          } > "$OUT/00_summary.md"

          {
            echo "# Commit and tree status"
            git log -1 --stat
            echo
            git status --short
          } > "$OUT/01_git_status.txt"

          {
            echo "# Protected/runtime config snapshot"
            echo "## render.yaml"
            sed -n '1,220p' render.yaml 2>/dev/null || true
            echo
            echo "## dashboard/backend/Dockerfile"
            sed -n '1,220p' dashboard/backend/Dockerfile 2>/dev/null || true
            echo
            echo "## dashboard/backend/requirements.txt"
            sed -n '1,220p' dashboard/backend/requirements.txt 2>/dev/null || true
            echo
            echo "## Run-FullQA.ps1 repo-root section"
            grep -nE 'Get-RepoRoot|GITHUB_WORKSPACE|repoRoot|Set-Location|C:\\Genesis_System3' Run-FullQA.ps1 || true
          } > "$OUT/02_runtime_config_snapshot.txt"

          {
            echo "# Safety flags"
            grep -RInE 'LIVE_TRADING_ENABLED|ANALYZE_MODE|PAPER_TRADING_MODE|SYSTEM3_MODE|place_order|modify_order|cancel_order' dashboard render.yaml .github/workflows Run-FullQA.ps1 \
              --exclude-dir=.git --exclude='*.png' --exclude='*.jpg' --exclude='*.pdf' 2>/dev/null | head -1000 || true
          } > "$OUT/03_safety_flags.txt"

          {
            echo "# Tracked forbidden/generated files check"
            echo "ENV_FILES="
            git ls-files '.env' '.env.*' 'config/.env' 'config/.env.*' || true
            echo
            echo "PYC_FILES="
            git ls-files '*.pyc' || true
            echo
            echo "PYCACHE_PATHS="
            git ls-files | grep -E '(^|/)__pycache__/' || true
            echo
            echo "AUDIT_ARTIFACTS_TRACKED="
            git ls-files 'audit_artifacts/**' || true
            echo
            echo "PRIVATE_KEY_STYLE_FILES="
            git ls-files '*.pem' '*.key' '*.p8' '*.p12' '*.pfx' 'id_rsa' 'id_ed25519' || true
          } > "$OUT/04_forbidden_tracked_files.txt"

          {
            echo "# Python compile smoke"
            python --version
            for f in dashboard/backend/app.py Run-FullQA.ps1; do
              if [[ "$f" == *.py ]]; then
                python -m py_compile "$f" && echo "PY_COMPILE_PASS $f" || echo "PY_COMPILE_FAIL $f"
              else
                echo "SCRIPT_PRESENT $f"
              fi
            done
          } > "$OUT/05_compile_smoke.txt" 2>&1 || true

          python - <<'PY' > "$OUT/06_pass_fail_summary.json"
          import json, os, subprocess
          def cmd(args):
              return subprocess.check_output(args, text=True, stderr=subprocess.DEVNULL).splitlines()
          tracked_env = cmd(['git','ls-files','.env','.env.*','config/.env','config/.env.*'])
          tracked_pyc = cmd(['git','ls-files','*.pyc'])
          all_files = cmd(['git','ls-files'])
          tracked_pycache = [p for p in all_files if '/__pycache__/' in p or p.startswith('__pycache__/')]
          tracked_audit = [p for p in all_files if p.startswith('audit_artifacts/')]
          private_keys = cmd(['git','ls-files','*.pem','*.key','*.p8','*.p12','*.pfx','id_rsa','id_ed25519'])
          text = open('Run-FullQA.ps1','r',encoding='utf-8',errors='replace').read() if os.path.exists('Run-FullQA.ps1') else ''
          result = {
              'tracked_env_files': tracked_env,
              'tracked_pyc_files_count': len(tracked_pyc),
              'tracked_pycache_count': len(tracked_pycache),
              'tracked_audit_artifacts_count': len(tracked_audit),
              'tracked_private_key_style_files': private_keys,
              'run_fullqa_uses_github_workspace': 'GITHUB_WORKSPACE' in text,
              'run_fullqa_hardcoded_c_genesis_present': 'C:\\Genesis_System3' in text,
              'render_live_trading_disabled_in_yaml': 'LIVE_TRADING_ENABLED' in open('render.yaml',encoding='utf-8').read() and '"0"' in open('render.yaml',encoding='utf-8').read(),
          }
          result['pass'] = (
              not tracked_env and
              len(tracked_pyc) == 0 and
              len(tracked_pycache) == 0 and
              len(tracked_audit) == 0 and
              not private_keys and
              result['run_fullqa_uses_github_workspace'] and
              not result['run_fullqa_hardcoded_c_genesis_present'] and
              result['render_live_trading_disabled_in_yaml']
          )
          print(json.dumps(result, indent=2, sort_keys=True))
          PY

          if grep -q '"pass": true' "$OUT/06_pass_fail_summary.json"; then
            echo "SYSTEM3_AUTO_VERIFIER_PASS" | tee "$OUT/07_verdict.txt"
          else
            echo "SYSTEM3_AUTO_VERIFIER_FAIL" | tee "$OUT/07_verdict.txt"
            cat "$OUT/06_pass_fail_summary.json"
            exit 1
          fi

          (cd audit_artifacts && zip -r "$(basename "$OUT").zip" "$(basename "$OUT")")
          echo "ZIP_PATH=audit_artifacts/$(basename "$OUT").zip" >> "$GITHUB_ENV"

      - name: Upload verifier artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system3-auto-verifier
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: warn
          retention-days: 14
