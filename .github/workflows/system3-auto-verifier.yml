name: System3 Auto Verifier

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - render.yaml
      - dashboard/backend/**
      - .github/workflows/**
      - Run-FullQA.ps1
      - .gitignore

permissions:
  contents: read

jobs:
  auto-verifier:
    name: System3 auto verification proof
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build verification artifact
        shell: bash
        run: |
          set -euo pipefail
          OUT="audit_artifacts/system3_auto_verifier_$(date -u +%Y%m%dT%H%M%SZ)"
          mkdir -p "$OUT"
          echo "OUT=$OUT" >> "$GITHUB_ENV"

          {
            echo "# System3 Auto Verifier"
            echo "Generated UTC: $(date -u --iso-8601=seconds)"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Mode: proof-only; no broker login; no orders; no live trading"
          } > "$OUT/00_summary.md"

          git log -1 --stat > "$OUT/01_git_status.txt"
          git status --short >> "$OUT/01_git_status.txt"

          {
            echo "# Runtime config snapshot"
            echo "## render.yaml"
            sed -n '1,160p' render.yaml 2>/dev/null || true
            echo "## Dockerfile"
            sed -n '1,160p' dashboard/backend/Dockerfile 2>/dev/null || true
            echo "## Run-FullQA portable markers"
            grep -nE 'Get-RepoRoot|GITHUB_WORKSPACE|Set-Location' Run-FullQA.ps1 || true
          } > "$OUT/02_runtime_config_snapshot.txt"

          {
            echo "# Forbidden tracked files"
            git ls-files | grep -E '(^|/)\.env($|\.)|(^|/)config/\.env($|\.)|(^|/)__pycache__/|\.pyc$|(^|/)audit_artifacts/' || true
          } > "$OUT/03_forbidden_tracked_files.txt"

          {
            echo "# Compile smoke"
            python --version
            python -m py_compile dashboard/backend/app.py && echo "PY_COMPILE_PASS dashboard/backend/app.py" || echo "PY_COMPILE_FAIL dashboard/backend/app.py"
          } > "$OUT/04_compile_smoke.txt" 2>&1 || true

          python - <<'PY' > "$OUT/05_pass_fail_summary.json"
          import json, subprocess, os
          files = subprocess.check_output(['git','ls-files'], text=True).splitlines()
          forbidden = [p for p in files if p == '.env' or p.startswith('.env.') or p == 'config/.env' or p.startswith('config/.env.') or '/__pycache__/' in p or p.endswith('.pyc') or p.startswith('audit_artifacts/')]
          qa_text = open('Run-FullQA.ps1', encoding='utf-8', errors='replace').read() if os.path.exists('Run-FullQA.ps1') else ''
          render_text = open('render.yaml', encoding='utf-8', errors='replace').read() if os.path.exists('render.yaml') else ''
          result = {
            'forbidden_tracked_files': forbidden,
            'run_fullqa_has_portable_workspace_logic': 'GITHUB_WORKSPACE' in qa_text and 'Get-RepoRoot' in qa_text,
            'render_live_trading_disabled': 'LIVE_TRADING_ENABLED' in render_text and '"0"' in render_text,
          }
          result['pass'] = (not forbidden) and result['run_fullqa_has_portable_workspace_logic'] and result['render_live_trading_disabled']
          print(json.dumps(result, indent=2, sort_keys=True))
          PY

          if grep -q '"pass": true' "$OUT/05_pass_fail_summary.json"; then
            echo "SYSTEM3_AUTO_VERIFIER_PASS" | tee "$OUT/06_verdict.txt"
          else
            echo "SYSTEM3_AUTO_VERIFIER_FAIL" | tee "$OUT/06_verdict.txt"
            cat "$OUT/05_pass_fail_summary.json"
            exit 1
          fi

          (cd audit_artifacts && zip -r "$(basename "$OUT").zip" "$(basename "$OUT")")
          echo "ZIP_PATH=audit_artifacts/$(basename "$OUT").zip" >> "$GITHUB_ENV"

      - name: Upload verifier artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system3-auto-verifier
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: warn
          retention-days: 14
