name: Production Grade Readiness Gate

on:
  workflow_dispatch:
  schedule:
    - cron: '10 4 * * *'
  push:
    branches:
      - main
    paths:
      - .github/workflows/production-grade-readiness.yml
      - reports/latest/**
      - docs/project_control/**
      - dashboard/**
      - core/**
      - scripts/**
      - render.yaml

permissions:
  contents: write

jobs:
  production-grade-readiness:
    name: Build production-grade blocker matrix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build production readiness report
        shell: bash
        run: |
          set -euo pipefail
          OUT="reports/latest/production_grade_readiness"
          rm -rf "$OUT"
          mkdir -p "$OUT"

          python - <<'PY'
          import json, os
          from pathlib import Path
          from datetime import datetime, timezone

          def read_json(path):
              p = Path(path)
              if not p.exists():
                  return None
              try:
                  return json.loads(p.read_text(encoding='utf-8'))
              except Exception as exc:
                  return {'_json_error': repr(exc)}

          proofs = {
              'trading_pipeline': read_json('reports/latest/full_trading_pipeline_readiness/09_pipeline_gate_summary.json'),
              'repo_scan_clean': read_json('reports/latest/full_repo_scan_clean/07_scan_clean_summary.json'),
              'repo_cleanliness': read_json('reports/latest/repo_cleanliness/05_cleanliness_summary.json'),
              'entrypoint_classification': read_json('reports/latest/entrypoint_classification/entrypoint_classification_summary.json'),
              'model_backtest_readiness': read_json('reports/latest/model_backtest_readiness/06_model_backtest_summary.json'),
              'render_endpoint': read_json('reports/latest/render_endpoint_proof/endpoint_summary.json'),
              'dashboard_endpoint_coverage': read_json('reports/latest/dashboard_endpoint_coverage/endpoint_coverage_summary.json'),
              'dashboard_ultra_readiness': read_json('reports/latest/dashboard_ultra_readiness/dashboard_ultra_readiness_summary.json'),
              'external_yahoo': read_json('reports/latest/external_data_yahoo/yahoo_data_summary.json'),
              'safe_dryrun': read_json('reports/latest/safe_dryrun_validation_execution/02_execution_summary.json'),
          }

          checks = []
          def add(area, check, ok, severity, fix):
              checks.append({'area': area, 'check': check, 'ok': bool(ok), 'severity': severity, 'fix': fix})

          tp = proofs['trading_pipeline'] or {}
          scan = proofs['repo_scan_clean'] or {}
          ep = proofs['entrypoint_classification'] or {}
          mb = proofs['model_backtest_readiness'] or {}
          render = proofs['render_endpoint'] or {}
          dash_cov = proofs['dashboard_endpoint_coverage'] or {}
          dash_ultra = proofs['dashboard_ultra_readiness'] or {}
          yahoo = proofs['external_yahoo'] or {}
          dry = proofs['safe_dryrun'] or {}

          add('repo', 'no forbidden secret-style files', scan.get('forbidden_secret_style_count') == 0, 'critical', 'remove tracked secrets and rotate credentials')
          add('repo', 'no generated files pending removal', scan.get('generated_auto_remove_count_before_cleanup') == 0, 'medium', 'run full repo scan clean')
          add('repo', 'no large tracked files >5MB', scan.get('large_tracked_file_count_over_5mb') == 0, 'medium', 'move large runtime artifacts out of git')
          add('repo', 'old/backup/copy files classified', scan.get('old_backup_copy_review_candidate_count', 999) == 0, 'medium', 'classify 12 review candidates with runtime map before delete/archive')

          add('runtime', 'backend runtime present', tp.get('runtime_backend_present') is True, 'critical', 'fix Render/backend runtime')
          add('runtime', 'DhanHQ dependency present', tp.get('smartapi_dependency_present') is True, 'critical', 'fix backend requirements (dhanhq>=2.2.0)')
          add('runtime', 'live trading disabled', tp.get('render_live_trading_disabled') is True, 'critical', 'force analyzer/paper mode only')
          add('runtime', 'render endpoint proof published', proofs['render_endpoint'] is not None, 'critical', 'run Render endpoint proof')

          add('data', 'Yahoo fallback data proof published', proofs['external_yahoo'] is not None, 'medium', 'run external Yahoo data proof')
          add('data', 'Yahoo fallback symbols OK', yahoo.get('symbols_failed') == 0 if yahoo else False, 'medium', 'fix external public data fallback')
          add('data', 'broker/analyzer market data proven', tp.get('proven_live_market_paper_trade_today') is True, 'critical', 'connect broker in analyzer mode and prove paper lifecycle')

          add('model', 'fresh model training proven', tp.get('proven_model_training_fresh') is True, 'critical', 'run authoritative training/load proof')
          add('model', 'fresh training accuracy metric proven', mb.get('fresh_training_accuracy_metric_proven') is True, 'critical', 'publish accuracy metrics with dataset/date')
          add('model', 'entrypoint classification published', proofs['entrypoint_classification'] is not None and ep.get('backtest_candidate_count', 0) > 0, 'medium', 'run entrypoint classification')

          add('backtest', 'recent backtest proven', tp.get('proven_backtest_recent') is True, 'critical', 'run recent backtest')
          add('backtest', 'walk-forward cost/slippage proven', mb.get('walk_forward_cost_slippage_proven') is True, 'critical', 'run walk-forward with costs/slippage')
          add('backtest', 'safe dry-run validation execution proof published', proofs['safe_dryrun'] is not None, 'medium', 'run safe dry-run validation workflow')
          add('backtest', 'safe dry-run commands passed', dry.get('commands_failed') == 0 if dry else False, 'medium', 'fix dry-run failures')

          add('paper_lifecycle', 'live-market analyzer paper trade today proven', tp.get('proven_live_market_paper_trade_today') is True, 'critical', 'prove BUY/SELL/fill/exit/PnL lifecycle in analyzer mode')
          add('paper_lifecycle', 'trade ready flag false until proof complete', tp.get('trade_ready') is False, 'safety', 'keep trade_ready false until all blockers clear')

          add('dashboard', 'full dashboard proof published', proofs['dashboard_ultra_readiness'] is not None, 'critical', 'run ultra dashboard readiness proof')
          add('dashboard', 'dashboard endpoint coverage published', proofs['dashboard_endpoint_coverage'] is not None, 'critical', 'run dashboard endpoint coverage proof')
          add('dashboard', 'full dashboard ready proven', dash_ultra.get('full_ultra_dashboard_ready_proven') is True if dash_ultra else False, 'critical', 'fix frontend build/UI/API wiring and browser proof')
          add('dashboard', 'backend endpoint coverage core ok', dash_cov.get('core_ok') is True if dash_cov else False, 'critical', 'fix failing read-only endpoint coverage')
          add('dashboard', 'browser visual proof completed', False, 'critical', 'run browser/UI screenshot smoke proof')

          add('production', 'overall trading pipeline trade_ready', tp.get('trade_ready') is True, 'critical', 'clear all pipeline blockers first')

          blockers = [c for c in checks if not c['ok']]
          critical_blockers = [c for c in blockers if c['severity'] == 'critical']
          medium_blockers = [c for c in blockers if c['severity'] == 'medium']
          safety_blockers = [c for c in blockers if c['severity'] == 'safety']

          next_queue = []
          for c in critical_blockers + medium_blockers:
              fix = c['fix']
              if fix not in next_queue:
                  next_queue.append(fix)

          result = {
              'generated_utc': datetime.now(timezone.utc).isoformat(),
              'production_grade_ready': len(critical_blockers) == 0 and len(medium_blockers) == 0,
              'trade_ready': tp.get('trade_ready') is True,
              'mode': 'Analyzer/Paper only; live trading disabled',
              'checks_total': len(checks),
              'checks_passed': sum(1 for c in checks if c['ok']),
              'checks_failed': len(blockers),
              'critical_blocker_count': len(critical_blockers),
              'medium_blocker_count': len(medium_blockers),
              'safety_blocker_count': len(safety_blockers),
              'checks': checks,
              'blockers': blockers,
              'next_fix_queue': next_queue,
              'verdict': 'PRODUCTION_GRADE_READY' if len(critical_blockers) == 0 and len(medium_blockers) == 0 else 'NOT_PRODUCTION_GRADE_READY',
          }

          out = Path('reports/latest/production_grade_readiness')
          out.mkdir(parents=True, exist_ok=True)
          (out/'production_grade_readiness_summary.json').write_text(json.dumps(result, indent=2, sort_keys=True), encoding='utf-8')

          lines = ['# Production Grade Readiness Gate', '', f"Generated UTC: {result['generated_utc']}", '', f"Verdict: `{result['verdict']}`", f"Production-grade ready: `{result['production_grade_ready']}`", f"Trade ready: `{result['trade_ready']}`", '', f"Checks passed: `{result['checks_passed']}/{result['checks_total']}`", f"Critical blockers: `{result['critical_blocker_count']}`", f"Medium blockers: `{result['medium_blocker_count']}`", '', '## Blockers', '', '| Area | Check | Severity | Fix |', '|---|---|---|---|']
          for c in blockers:
              lines.append(f"| `{c['area']}` | `{c['check']}` | `{c['severity']}` | {c['fix']} |")
          lines += ['', '## Next fix queue', '']
          for i, q in enumerate(next_queue, 1):
              lines.append(f'{i}. {q}')
          lines += ['', 'Analyzer/Paper only. Live trading disabled.']
          (out/'README.md').write_text('\n'.join(lines)+'\n', encoding='utf-8')
          PY

          cat "$OUT/README.md"

      - name: Commit production grade readiness proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/production_grade_readiness
          if git diff --cached --quiet; then
            echo "No production readiness proof changes to commit."
          else
            git commit -m "audit: publish production grade readiness gate"
            git push
          fi
