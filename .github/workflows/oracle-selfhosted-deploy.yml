name: Oracle VM - Self Hosted Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: Deploy backend container on Oracle VM
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_healthcheck:
        description: Run post-deploy healthcheck
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: read

concurrency:
  group: oracle-selfhosted-deploy
  cancel-in-progress: false

jobs:
  oracle-runner-preflight:
    name: Oracle runner preflight
    runs-on: [self-hosted, oracle, system3]
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight proof
        shell: bash
        run: |
          set -euo pipefail
          echo "RUNNER_NAME=${RUNNER_NAME:-unknown}"
          echo "RUNNER_OS=${RUNNER_OS:-unknown}"
          echo "REPO=$GITHUB_REPOSITORY"
          echo "SHA=$GITHUB_SHA"
          command -v docker
          docker --version
          docker compose version
          test -f docker-compose.oracle.yml
          test -f scripts/oracle_healthcheck.sh
          echo "Oracle self-hosted runner preflight PASS"

  deploy-backend:
    name: Deploy backend on Oracle VM
    needs: oracle-runner-preflight
    if: ${{ inputs.deploy_backend == 'true' }}
    runs-on: [self-hosted, oracle, system3]
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR for private package pull
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull and restart backend
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.oracle.yml pull genesis-backend
          docker compose -f docker-compose.oracle.yml up -d genesis-backend
          docker compose -f docker-compose.oracle.yml ps

      - name: Post-deploy healthcheck
        if: ${{ inputs.run_healthcheck == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/oracle_healthcheck.sh
