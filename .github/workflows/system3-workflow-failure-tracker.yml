name: System3 Workflow Failure Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  workflow_run:
    workflows:
      - System3 Parallel Root-Cause Audit
      - Dashboard Visual Production Proof
      - System3 Public Truth Publish
      - Options CE PE ML Training Proof
    types:
      - completed
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/system3-workflow-failure-tracker.yml'
      - 'tools/system3_workflow_failure_tracker.py'

permissions:
  contents: write
  actions: read

jobs:
  track-failures:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'workflow_run' || github.event.workflow_run.name != 'System3 Workflow Failure Tracker'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Track failed workflows into TODO
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/system3_workflow_failure_tracker.py
      - name: Commit workflow failure TODO
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/workflow_failure_tracker/ docs/SYSTEM3_WORKFLOW_FAILURE_TODO.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci(todo): update workflow failure todo [skip ci]"
          git push
