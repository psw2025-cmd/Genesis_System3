name: Render Inject Dhan Env Vars

# Triggered by push to the fallback trigger file (same pattern as render-cli-deploy.yml)
on:
  push:
    branches:
      - main
    paths:
      - dashboard/backend/DEPLOY_REFRESH_TRIGGER.md
      - .github/workflows/render-inject-dhan-env.yml

permissions:
  contents: read

concurrency:
  group: render-inject-dhan-env
  cancel-in-progress: false

jobs:
  inject-and-redeploy:
    name: Inject Dhan env vars into Render and redeploy
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.RENDER_API_KEY }}"    || (echo "MISSING: RENDER_API_KEY" && exit 1)
          test -n "${{ secrets.RENDER_SERVICE_ID }}" || (echo "MISSING: RENDER_SERVICE_ID" && exit 1)
          test -n "${{ secrets.DHAN_ACCESS_TOKEN }}" || (echo "MISSING: DHAN_ACCESS_TOKEN — add it at Settings → Secrets → Actions → New repository secret" && exit 1)
          echo "All required secrets present."

      - name: Fetch current Render env vars, merge Dhan vars, update
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          DHAN_CLIENT_ID: "1106583741"
        run: |
          set -euo pipefail

          echo "Fetching current Render env vars..."
          http_code=$(curl -sS -o /tmp/render_env_current.json -w "%{http_code}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json")
          echo "GET HTTP_STATUS=${http_code}"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Failed to fetch current env vars"
            cat /tmp/render_env_current.json
            exit 1
          fi

          echo "Merging Dhan credentials into env var set..."
          python3 - <<PY
          import json, os

          with open('/tmp/render_env_current.json') as f:
              raw = json.load(f)

          # Render returns list of {"envVar": {"key": ..., "value": ...}} objects
          existing = {}
          for item in raw:
              ev = item.get('envVar', item)  # handle both shapes
              k = ev.get('key', '')
              v = ev.get('value', '')
              if k:
                  existing[k] = v

          # Inject Dhan credentials (never printed)
          existing['DHAN_CLIENT_ID']     = os.environ['DHAN_CLIENT_ID']
          existing['DHAN_ACCESS_TOKEN']  = os.environ['DHAN_ACCESS_TOKEN']

          # Build PUT payload
          payload = [{"key": k, "value": v} for k, v in existing.items()]

          with open('/tmp/render_env_merged.json', 'w') as f:
              json.dump(payload, f)

          print(f"Total env vars after merge: {len(payload)}")
          keys_safe = [e['key'] for e in payload]
          print(f"Keys present: {keys_safe}")
          PY

          echo "Pushing merged env vars to Render..."
          put_code=$(curl -sS -o /tmp/render_env_put.json -w "%{http_code}" \
            -X PUT "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d @/tmp/render_env_merged.json)
          echo "PUT HTTP_STATUS=${put_code}"
          if [ "$put_code" -lt 200 ] || [ "$put_code" -ge 300 ]; then
            echo "Failed to update env vars"
            cat /tmp/render_env_put.json
            exit 1
          fi
          echo "Render env vars updated successfully."

      - name: Trigger Render redeploy and poll until live
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          echo "Triggering Render redeploy..."
          http_code=$(curl -sS -o /tmp/render_deploy.json -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          echo "DEPLOY HTTP_STATUS=${http_code}"
          file_size=$(wc -c < /tmp/render_deploy.json)
          echo "DEPLOY RESPONSE SIZE=${file_size} bytes"

          # Render returns 202 with empty body when a deploy is already in progress.
          # In that case, fall back to polling the latest deploy from the list.
          deploy_id=""
          if [ "$file_size" -gt 4 ]; then
            deploy_id=$(python3 -c "import json; d=json.load(open('/tmp/render_deploy.json')); print(d.get('id',''))" 2>/dev/null || true)
          fi

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Redeploy trigger failed (HTTP ${http_code})"
            cat /tmp/render_deploy.json
            exit 1
          fi

          if [ -n "$deploy_id" ]; then
            echo "New deploy created: ${deploy_id}"
          else
            echo "202 with empty body — deploy already in progress; will poll latest deploy from list."
            curl -sS -o /tmp/render_deploys_list.json \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=1" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json"
            deploy_id=$(python3 -c "import json,sys; items=json.load(open('/tmp/render_deploys_list.json')); d=items[0].get('deploy',items[0]) if isinstance(items,list) and items else {}; print(d.get('id',''))")
            echo "Latest deploy id: ${deploy_id}"
          fi

          if [ -z "$deploy_id" ]; then
            echo "Could not determine deploy id — aborting."
            exit 1
          fi

          # Poll until live
          echo "Polling deploy ${deploy_id} for up to 10 minutes..."
          for attempt in $(seq 1 40); do
            sc=$(curl -sS -o /tmp/render_status.json -w "%{http_code}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json")
            status=$(python3 -c "import json; d=json.load(open('/tmp/render_status.json')); print(str(d.get('status',d.get('deploy',{}).get('status',''))).lower())" 2>/dev/null || echo "unknown")
            echo "POLL_ATTEMPT=${attempt} STATUS=${status}"
            case "$status" in
              live|succeeded|success|deployed)
                echo "RENDER_DEPLOY: PASS — deploy is live"
                exit 0 ;;
              build_failed|update_failed|pre_deploy_failed|canceled|cancelled|failed)
                echo "RENDER_DEPLOY: FAIL (${status})"
                cat /tmp/render_status.json
                exit 1 ;;
            esac
            sleep 15
          done
          echo "RENDER_DEPLOY: TIMEOUT after 10 minutes"
          exit 1
