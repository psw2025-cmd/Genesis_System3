name: System3 1000 Point TODO Status Updater

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - System3 Parallel Root-Cause Audit
      - System3 Workflow Failure Tracker
      - System3 GitHub Render Failure Tracker
      - Dashboard Visual Production Proof
      - Dashboard Visible Issue Tracker
      - System3 Public Truth Publish
      - Options CE PE ML Training Proof
    types:
      - completed
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/system3-todo-status-updater.yml'
      - 'tools/system3_todo_status_updater.py'
      - 'docs/SYSTEM3_PRODUCTION_GRADE_1000_POINT_QC_TODO.md'
      - 'System3_Production_Grade_1000_Point_QC_TODO.md'
      - 'reports/latest/**'

permissions:
  contents: write

concurrency:
  group: system3-1000-point-todo-status
  cancel-in-progress: true

env:
  ANALYZE_MODE: '1'
  LIVE_TRADING_ENABLED: '0'
  SYSTEM3_LIVE_TRADING_ALLOWED: '0'

jobs:
  update-todo-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'workflow_run' || github.event.workflow_run.name != 'System3 1000 Point TODO Status Updater'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify analyzer-only safety flags
        shell: bash
        run: |
          set -euo pipefail
          test "$ANALYZE_MODE" = "1"
          test "$LIVE_TRADING_ENABLED" = "0"
          test "$SYSTEM3_LIVE_TRADING_ALLOWED" = "0"

      - name: Normalize current proof paths for TODO updater
        shell: python
        run: |
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path('reports/latest')

          def read(path):
              try:
                  return json.loads(path.read_text(encoding='utf-8')) if path.exists() else {}
              except Exception:
                  return {}

          def stamp(data):
              raw = data.get('generated_at') or data.get('generated_utc') or data.get('generated_at_utc') or ''
              try:
                  return datetime.fromisoformat(str(raw).replace('Z', '+00:00'))
              except Exception:
                  return datetime.min.replace(tzinfo=timezone.utc)

          visual_target = root / 'dashboard_visual_production_proof' / 'summary.json'
          visible_source = root / 'dashboard_visible_issue_tracker' / 'summary.json'
          legacy = read(visual_target)
          current = read(visible_source)
          if current and (not legacy or stamp(current) >= stamp(legacy)):
              status = str(current.get('status') or '').upper()
              auth = current.get('auth') if isinstance(current.get('auth'), dict) else {}
              tabs = current.get('tabs') if isinstance(current.get('tabs'), list) else []
              expected = int(current.get('expected_tab_count') or 16)
              scanned = len(tabs)
              eligible = bool(
                  status == 'PASS'
                  and current.get('production_grade_claim_allowed') is True
                  and auth.get('ok') is True
                  and scanned == expected
                  and int(current.get('screenshot_missing_count') or 0) == 0
                  and int(current.get('visible_issue_count') or 0) == 0
                  and int(current.get('ui_exception_count') or 0) == 0
                  and not current.get('global_exception')
              )
              safe = {
                  'generated_at': current.get('generated_at'),
                  'final_verdict': 'PASS' if eligible else 'BLOCKED',
                  'visual_gate_pass': eligible,
                  'screenshots': [{'ok': True} for _ in tabs] if eligible else [],
                  'auth_ok': bool(auth.get('ok') is True),
                  'expected_tab_count': expected,
                  'scanned_tab_count': scanned,
                  'source': 'dashboard_visible_issue_tracker',
              }
              visual_target.parent.mkdir(parents=True, exist_ok=True)
              visual_target.write_text(json.dumps(safe, indent=2, sort_keys=True), encoding='utf-8')

          failure_target = root / 'workflow_failure_tracker' / 'summary.json'
          render_source = root / 'github_render_failure_tracker' / 'summary.json'
          legacy = read(failure_target)
          current = read(render_source)
          if current and (not legacy or stamp(current) >= stamp(legacy)):
              safe = {
                  'generated_at': current.get('generated_at') or current.get('generated_utc'),
                  'status': str(current.get('status') or 'BLOCKED').upper(),
                  'failed_count': int(
                      current.get('failed_count')
                      or current.get('workflow_failed_count')
                      or current.get('github_failed_count')
                      or 0
                  ),
                  'source': 'github_render_failure_tracker',
              }
              failure_target.parent.mkdir(parents=True, exist_ok=True)
              failure_target.write_text(json.dumps(safe, indent=2, sort_keys=True), encoding='utf-8')

      - name: Convert 1000 point TODO into proof status
        run: python tools/system3_todo_status_updater.py

      - name: Validate fail-closed report
        shell: python
        run: |
          import json
          from pathlib import Path

          report = Path('reports/latest/todo_status_update/summary.json')
          if not report.exists():
              raise SystemExit('TODO status summary was not generated')
          data = json.loads(report.read_text(encoding='utf-8'))
          status = str(data.get('status') or '').upper()
          if status not in {'DONE', 'BLOCKED'}:
              raise SystemExit(f'Unexpected TODO status: {status!r}')
          allowed = data.get('production_grade_claim_allowed') is True
          if status != 'DONE' and allowed:
              raise SystemExit('Blocked TODO report cannot allow a production-grade claim')
          print(f"todo_status={status}")
          print(f"todo_total={int(data.get('total') or 0)}")
          print(f"production_grade_claim_allowed={allowed}")

      - name: Commit TODO status report
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          publish_report() {
            git add -f reports/latest/todo_status_update/
            if git diff --cached --quiet; then
              return 0
            fi
            git commit -m "ci(todo): update 1000 point proof status [skip ci]"
            git push origin HEAD:main
          }

          if publish_report; then
            exit 0
          fi

          # Concurrent proof publishers frequently move main. The TODO report is
          # derived evidence, so rebuild it on the newest main instead of trying
          # to rebase a generated-file commit and risking a same-path conflict.
          for attempt in 2 3; do
            git fetch origin main
            git reset --hard origin/main
            python tools/system3_todo_status_updater.py
            python - <<'PY'
          import json
          from pathlib import Path
          p = Path('reports/latest/todo_status_update/summary.json')
          d = json.loads(p.read_text(encoding='utf-8'))
          status = str(d.get('status') or '').upper()
          allowed = d.get('production_grade_claim_allowed') is True
          if status not in {'DONE', 'BLOCKED'} or (status != 'DONE' and allowed):
              raise SystemExit('Regenerated TODO evidence failed closed validation')
          PY
            if publish_report; then
              exit 0
            fi
            sleep $((attempt * 2))
          done
          exit 1
