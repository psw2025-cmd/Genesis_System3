name: Render Endpoint Proof

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/render-endpoint-proof.yml
      - dashboard/backend/**
      - render.yaml

permissions:
  contents: write

jobs:
  render-endpoint-proof:
    name: Verify public Render endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Probe and validate endpoints
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, time, urllib.request, urllib.error, sys
          from pathlib import Path
          from datetime import datetime, timezone

          base = 'https://genesis-system3-backend.onrender.com'
          endpoints = [
              '/api/broker/dhan/status',
              '/api/broker/status',
              '/api/health',
              '/api/state',
              '/',
          ]

          def fetch(path):
              url = base + path
              t0 = time.time()
              item = {'url': url, 'path': path}
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'System3EndpointProof/1.0'})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = resp.read(8000).decode('utf-8', errors='replace')
                      item['status_code'] = resp.status
                      item['elapsed_ms'] = int((time.time() - t0) * 1000)
                      item['body'] = body
                      item['ok'] = True
              except urllib.error.HTTPError as exc:
                  item['status_code'] = exc.code
                  item['elapsed_ms'] = int((time.time() - t0) * 1000)
                  item['body'] = exc.read(2000).decode('utf-8', errors='replace') if exc.fp else ''
                  item['ok'] = False
                  item['error'] = str(exc)
              except Exception as exc:
                  item['status_code'] = None
                  item['elapsed_ms'] = int((time.time() - t0) * 1000)
                  item['body'] = ''
                  item['ok'] = False
                  item['error'] = repr(exc)
              return item

          results = {}
          for path in endpoints:
              print(f'\n--- Probing {path} ---')
              r = fetch(path)
              results[path] = r
              print(f'HTTP {r["status_code"]}  {r["elapsed_ms"]}ms')
              print(r['body'][:2000])

          # ─── Validation ───────────────────────────────────────────────
          checks = []
          all_pass = True

          def chk(name, value, expected_true=True):
              global all_pass
              status = 'PASS' if bool(value) == expected_true else 'FAIL'
              if status == 'FAIL':
                  all_pass = False
              checks.append({'name': name, 'status': status, 'detail': repr(value)})
              print(f'  [{status}] {name}: {value!r}')

          def parse(path):
              r = results.get(path, {})
              try:
                  return json.loads(r.get('body', '{}') or '{}')
              except Exception:
                  return {}

          print('\n\n=== VALIDATION ===')

          # 1. /api/broker/dhan/status
          d = parse('/api/broker/dhan/status')
          print('\n/api/broker/dhan/status:')
          chk('dhan/status HTTP 200', results['/api/broker/dhan/status']['ok'])
          chk('dhan connected=true', d.get('connected') is True)
          chk('dhan broker name=dhan', d.get('broker') == 'dhan' or d.get('name') == 'dhan')
          chk('dhan live_trading_enabled=false', d.get('live_trading_enabled') is False)
          chk('dhan order_placement_allowed=false', d.get('order_placement_allowed') is False)

          # 2. /api/broker/status
          b = parse('/api/broker/status')
          print('\n/api/broker/status:')
          chk('broker/status HTTP 200', results['/api/broker/status']['ok'])
          chk('broker/status connected=true', b.get('connected') is True)
          chk('broker/status broker=dhan', b.get('broker') == 'dhan' or b.get('name') == 'dhan')
          chk('broker/status live_trading_enabled=false', b.get('live_trading_enabled') is False)
          chk('broker/status order_placement_allowed=false', b.get('order_placement_allowed') is False)

          # 3. /api/health
          h = parse('/api/health')
          print('\n/api/health:')
          chk('health HTTP 200', results['/api/health']['ok'])
          chk('health no MODE_GATE blocker', 'Broker not connected' not in json.dumps(h.get('live_blockers', [])))
          chk('health broker.connected=true', (h.get('broker') or {}).get('connected') is True)
          chk('health live_allowed=false', h.get('live_allowed') is False or h.get('live_trading_enabled') is False)

          # 4. Token never printed
          all_bodies = ' '.join(r.get('body', '') for r in results.values())
          # Dhan JWTs start with eyJ — check none appear in any body
          import re
          jwt_matches = re.findall(r'eyJ[A-Za-z0-9_-]{40,}', all_bodies)
          print('\nToken safety:')
          chk('TOKEN_VALUE_PRINTED=NO (no JWT in any body)', len(jwt_matches) == 0)

          # ─── Summary ──────────────────────────────────────────────────
          print('\n\n=== PROOF SUMMARY ===')
          print(f'Generated UTC: {datetime.now(timezone.utc).isoformat()}')
          print(f'Overall: {"PASS" if all_pass else "FAIL"}')
          for c in checks:
              print(f'  [{c["status"]}] {c["name"]}')

          out = Path('reports/latest/render_endpoint_proof')
          out.mkdir(parents=True, exist_ok=True)
          summary = {
              'generated_utc': datetime.now(timezone.utc).isoformat(),
              'base_url': base,
              'all_checks_pass': all_pass,
              'checks': checks,
              'results': [
                  {k: v for k, v in r.items() if k != 'body'}
                  | {'body_preview': r.get('body', '')[:2000]}
                  for r in results.values()
              ],
          }
          (out / 'endpoint_summary.json').write_text(json.dumps(summary, indent=2, sort_keys=True))

          lines = [
              '# Render Endpoint Proof',
              '',
              f"Generated UTC: {summary['generated_utc']}",
              '',
              f"Base URL: `{base}`",
              '',
              f"**Overall: {'PASS' if all_pass else 'FAIL'}**",
              '',
              '| Check | Status | Detail |',
              '|---|---|---|',
          ]
          for c in checks:
              lines.append(f"| {c['name']} | **{c['status']}** | `{c['detail'][:80]}` |")
          lines.append('')
          (out / 'README.md').write_text('\n'.join(lines) + '\n')

          if not all_pass:
              print('\nFAIL: one or more checks failed (see above)')
              sys.exit(1)
          PY

      - name: Commit endpoint proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add reports/latest/render_endpoint_proof
          if git diff --cached --quiet; then
            echo "No endpoint proof changes to commit."
          else
            git commit -m "audit: publish Render endpoint proof [skip ci]"
            git push
          fi
