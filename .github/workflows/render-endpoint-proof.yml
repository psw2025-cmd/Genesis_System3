name: Render Endpoint Proof

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/render-endpoint-proof.yml
      - dashboard/backend/**
      - render.yaml

permissions:
  contents: write

jobs:
  render-endpoint-proof:
    name: Verify public Render endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Probe endpoints
        shell: bash
        run: |
          set -euo pipefail
          OUT="reports/latest/render_endpoint_proof"
          rm -rf "$OUT"
          mkdir -p "$OUT"

          python - <<'PY'
          import json, time, urllib.request, urllib.error
          from pathlib import Path
          from datetime import datetime, timezone

          base = 'https://genesis-system3-backend.onrender.com'
          paths = ['/', '/docs', '/api/health', '/api/state', '/api/broker/status']
          results = []
          for path in paths:
              url = base + path
              started = time.time()
              item = {'url': url, 'path': path}
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'System3EndpointProof/1.0'})
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = resp.read(5000).decode('utf-8', errors='replace')
                      item['status_code'] = resp.status
                      item['elapsed_ms'] = int((time.time() - started) * 1000)
                      item['body_preview'] = body[:1500]
                      item['ok'] = 200 <= resp.status < 400
              except urllib.error.HTTPError as exc:
                  item['status_code'] = exc.code
                  item['elapsed_ms'] = int((time.time() - started) * 1000)
                  item['body_preview'] = exc.read(1500).decode('utf-8', errors='replace') if exc.fp else ''
                  item['ok'] = False
                  item['error'] = str(exc)
              except Exception as exc:
                  item['status_code'] = None
                  item['elapsed_ms'] = int((time.time() - started) * 1000)
                  item['body_preview'] = ''
                  item['ok'] = False
                  item['error'] = repr(exc)
              results.append(item)

          summary = {
              'generated_utc': datetime.now(timezone.utc).isoformat(),
              'base_url': base,
              'all_core_endpoints_ok': all(r['ok'] for r in results if r['path'] in ['/', '/docs', '/api/health', '/api/state']),
              'broker_status_endpoint_ok': next((r['ok'] for r in results if r['path'] == '/api/broker/status'), False),
              'results': results,
          }
          out = Path('reports/latest/render_endpoint_proof')
          out.mkdir(parents=True, exist_ok=True)
          (out / 'endpoint_summary.json').write_text(json.dumps(summary, indent=2, sort_keys=True), encoding='utf-8')

          lines = ['# Render Endpoint Proof', '', f"Generated UTC: {summary['generated_utc']}", '', f"Base URL: `{base}`", '', '| Path | HTTP | OK | ms |', '|---|---:|---:|---:|']
          for r in results:
              lines.append(f"| `{r['path']}` | `{r.get('status_code')}` | `{r.get('ok')}` | `{r.get('elapsed_ms')}` |")
          lines.append('')
          lines.append(f"Core endpoints OK: `{summary['all_core_endpoints_ok']}`")
          lines.append(f"Broker endpoint OK: `{summary['broker_status_endpoint_ok']}`")
          lines.append('')
          lines.append('Note: broker endpoint can respond OK while broker itself is disconnected; inspect JSON body preview in `endpoint_summary.json`.')
          (out / 'README.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

          cat "$OUT/README.md"

      - name: Commit endpoint proof if changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/render_endpoint_proof
          if git diff --cached --quiet; then
            echo "No endpoint proof changes to commit."
          else
            git commit -m "audit: publish latest Render endpoint proof"
            git push
          fi
