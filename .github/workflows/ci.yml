name: Genesis System3 Global Safety CI

# Runs on the self-hosted Windows runner registered on this repo.
# Zero GitHub-hosted minutes consumed — required while billing is restricted.
#
# Self-hosted runner setup (one-time, run as Administrator on this machine):
#   1. gh api repos/psw2025-cmd/Genesis_System3/actions/runners/registration-token -X POST -q '.token'
#   2. Download: https://github.com/actions/runner/releases/latest  (windows-x64)
#   3. Extract to C:\actions-runner\
#   4. cd C:\actions-runner
#   5. .\config.cmd --url https://github.com/psw2025-cmd/Genesis_System3 --token <TOKEN> --name windows-self-hosted --labels self-hosted,windows --runasservice
#   6. .\run.cmd   (or install as service: .\svc.cmd install && .\svc.cmd start)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# READ-ONLY: no workflow may write back to the repo.
# Any contents:write here fails the workflow-policy-guard below.
permissions:
  contents: read
  actions: read

concurrency:
  group: global-safety-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SYSTEM3_MODE: analyze
  ANALYZE_MODE: "1"
  LIVE_TRADING_ENABLED: "0"
  SYSTEM3_LIVE_TRADING_ALLOWED: "0"
  SYSTEM3_REAL_ONLY: "1"
  DEFER_INSTRUMENT_WARMUP: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  # -----------------------------------------------------------------------
  # GATE 1 — Workflow policy + trading safety guard (BLOCKING)
  # Must be first. All other jobs depend on this passing.
  # Verifies: exactly 1 workflow file, no contents:write, no auto-fix,
  #           LIVE_TRADING_ENABLED=0 and SYSTEM3_LIVE_TRADING_ALLOWED=0
  #           hardcoded in this file.
  # -----------------------------------------------------------------------
  workflow-policy-guard:
    name: BLOCKING - workflow policy and trading safety guard
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify workflow policy and trading safety
        shell: bash
        run: |
          set -euo pipefail

          # --- 1. Exactly one workflow file must exist ---
          mapfile -t workflows < <(find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | sort)
          printf 'Workflow files found:\n'
          printf '  %s\n' "${workflows[@]}"
          test "${#workflows[@]}" -eq 1 || { echo "FAIL: expected 1 workflow file, found ${#workflows[@]}"; exit 1; }
          test "${workflows[0]}" = ".github/workflows/ci.yml" || { echo "FAIL: unexpected workflow file: ${workflows[0]}"; exit 1; }

          # --- 2. No contents:write (would allow repo mutations from CI) ---
          if grep -RIn "contents[:][ ]write" .github/workflows; then
            echo "FAIL: contents:write found in workflows — CI must be read-only"
            exit 1
          fi

          # --- 3. No auto-fix bots or cloud deploy ---
          # Character-class patterns prevent the grep command from matching itself.
          if grep -RIn "[-][-]auto[-]fix" .github/workflows; then
            echo "FAIL: auto-fix bots are forbidden in CI workflows"
            exit 1
          fi
          if grep -RIn "azure[/]webapps[-]deploy" .github/workflows; then
            echo "FAIL: azure cloud deploy is forbidden in CI workflows"
            exit 1
          fi

          # --- 4. Trading safety flags MUST be hardcoded off in this file ---
          grep -q 'LIVE_TRADING_ENABLED.*"0"' .github/workflows/ci.yml || \
            { echo "FAIL: LIVE_TRADING_ENABLED=0 missing from ci.yml env"; exit 1; }
          grep -q 'SYSTEM3_LIVE_TRADING_ALLOWED.*"0"' .github/workflows/ci.yml || \
            { echo "FAIL: SYSTEM3_LIVE_TRADING_ALLOWED=0 missing from ci.yml env"; exit 1; }

          echo "policy_guard=PASS"
          echo "trading_safety=PASS"

  # -----------------------------------------------------------------------
  # GATE 2 — Architecture and trading safety gate (BLOCKING)
  # -----------------------------------------------------------------------
  architecture-trading-safety:
    name: BLOCKING - architecture and trading safety gate
    runs-on: self-hosted
    timeout-minutes: 10
    needs: workflow-policy-guard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run root architecture gate
        shell: bash
        run: |
          set -euo pipefail
          python --version
          test -f .github/scripts/root_architecture_gate.py
          python .github/scripts/root_architecture_gate.py
          echo "architecture_gate=PASS"

  # -----------------------------------------------------------------------
  # GATE 3 — Python compile proof (BLOCKING, fast)
  # -----------------------------------------------------------------------
  python-compile-proof:
    name: BLOCKING - Python compile proof
    runs-on: self-hosted
    timeout-minutes: 5
    needs: workflow-policy-guard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile critical scripts
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile system3_control_plane.py
          python -m py_compile scripts/system3_full_repo_verification.py
          python -m py_compile scripts/system3_master_proof_orchestrator.py
          python -m py_compile scripts/system3_proof_pack_closure_gate.py
          echo "compile_proof=PASS"

  # -----------------------------------------------------------------------
  # GATE 4 — Full proof pack: install, compile, import smoke, pytest, proof
  # (BLOCKING)
  # -----------------------------------------------------------------------
  full-proof-pack-validation:
    name: BLOCKING - full proof pack validation
    runs-on: self-hosted
    timeout-minutes: 20
    needs: workflow-policy-guard
    env:
      SYSTEM3_MODE: analyze
      ANALYZE_MODE: "1"
      LIVE_TRADING_ENABLED: "0"
      SYSTEM3_LIVE_TRADING_ALLOWED: "0"
      SYSTEM3_REAL_ONLY: "1"
      DEFER_INSTRUMENT_WARMUP: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CI and backend dependencies
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python -m pip install --upgrade pip --quiet
          test -f requirements-ci.txt
          test -f dashboard/backend/requirements.txt
          python -m pip install --no-cache-dir -r requirements-ci.txt --quiet
          python -m pip install --no-cache-dir -r dashboard/backend/requirements.txt --quiet
          echo "deps_install=PASS"

      - name: Compile expanded critical scripts
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile system3_control_plane.py
          python -m py_compile system3_ultra.py
          python -m py_compile run_system3.py
          python -m py_compile .github/scripts/root_architecture_gate.py
          python -m py_compile scripts/system3_full_repo_verification.py
          python -m py_compile scripts/system3_master_proof_orchestrator.py
          python -m py_compile scripts/system3_issue_24_26_27_28_proof_batch.py
          python -m py_compile scripts/system3_proof_pack_closure_gate.py
          python -m py_compile dashboard/backend/app.py
          # Paper-day proof pack chain (2026-06-30/07-01 work) — these were
          # never in this list and CI "passing" never actually validated
          # them; closing that gap here rather than relying solely on
          # out-of-band py_compile checks done outside CI.
          python -m py_compile scripts/paper_day_proof_pack.py
          python -m py_compile scripts/run_dashboard_browser_proof.py
          python -m py_compile scripts/daily_prediction_benchmark.py
          python -m py_compile scripts/repo_authority_audit.py
          python -m py_compile core/utils/nse_holidays.py
          python -m py_compile scripts/cloud_worker.py
          python -m py_compile core/engine/system3_phase82_job_scheduler.py
          python -m py_compile scripts/system3_self_healing_watchdog.py
          # Frontend TypeScript check for new components (syntax only)
          test -f dashboard/frontend/src/components/LiveTradingGate.tsx && echo 'LiveTradingGate.tsx exists' || exit 1
          python -c "import json; json.load(open('config/system3_job_scheduler.json'))" && echo "scheduler_config_json=VALID"
          echo "compile_expanded=PASS"

      - name: Dashboard backend import smoke
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          os.environ["SYSTEM3_MODE"] = "analyze"
          os.environ["ANALYZE_MODE"] = "1"
          os.environ["LIVE_TRADING_ENABLED"] = "0"
          os.environ["SYSTEM3_LIVE_TRADING_ALLOWED"] = "0"
          os.environ["SYSTEM3_REAL_ONLY"] = "1"
          os.environ["DEFER_INSTRUMENT_WARMUP"] = "1"
          import dashboard.backend.app as app
          assert getattr(app, "app", None) is not None, "FastAPI app object missing"
          assert os.environ["LIVE_TRADING_ENABLED"] == "0", "LIVE_TRADING_ENABLED safety check failed"
          assert os.environ["SYSTEM3_LIVE_TRADING_ALLOWED"] == "0", "SYSTEM3_LIVE_TRADING_ALLOWED safety check failed"
          print("dashboard_backend_import_smoke=PASS")
          print("live_trading_safety_in_app=PASS")
          PY

      - name: Dashboard backend pytest suite
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest \
            tests/test_dashboard_app.py \
            tests/test_qc_validator_dhan_aliases.py \
            tests/test_qc_runtime_anomaly.py \
            tests/test_scheduler_catchup.py \
            -v --tb=short

      - name: Run proof batch
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/system3_issue_24_26_27_28_proof_batch.py
          python scripts/system3_issue_24_26_27_28_proof_batch.py
          test -d reports/latest/implementation_batch
          test -f reports/latest/implementation_batch/status_matrix.json
          test -f reports/latest/implementation_batch/unresolved_blockers.md
          echo "proof_batch=PASS"

      - name: Run proof pack closure gate
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/system3_proof_pack_closure_gate.py
          python scripts/system3_proof_pack_closure_gate.py
          test -f reports/latest/proof_pack_closure_gate/summary.json
          echo "proof_pack_closure_gate=PASS"

      - name: Upload proof pack artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system3-proof-pack-${{ github.run_number }}
          path: reports/latest/
          if-no-files-found: warn
          retention-days: 30

  # -----------------------------------------------------------------------
  # GATE 5 — Frontend production build (BLOCKING)
  # -----------------------------------------------------------------------
  frontend-build:
    name: BLOCKING - frontend production build
    runs-on: self-hosted
    timeout-minutes: 10
    needs: workflow-policy-guard
    defaults:
      run:
        working-directory: dashboard/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        shell: bash
        run: npm ci

      - name: Build (vite build)
        shell: bash
        run: npm run build
        # Note: TypeScript strict errors are pre-existing and tracked separately.
        # The vite build succeeding is the deployability gate.
