name: CI - Governance & QA Guardian

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Setup Node.js (for dashboard build + eslint)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_runtime.txt
          pip install -r requirements-dev.txt

      - name: Install Node.js dependencies
        run: |
          npm ci

      # Linting & Formatting
      - name: Run Black
        run: black --check .

      - name: Run Flake8
        run: flake8 .

      - name: Run Isort
        run: isort --check-only .

      - name: Run ESLint
        run: npx eslint .

      # Type Checking
      - name: Run Mypy
        run: mypy .

      # Security Scanning
      - name: Run Bandit
        run: bandit -r core

      - name: Run Safety
        run: safety check --full-report

      - name: Run Pip-Audit
        run: pip-audit --requirement requirements_runtime.txt --requirement requirements-dev.txt

      # Testing
      - name: Run Pytest
        run: pytest --maxfail=1 --disable-warnings -q

      # Documentation Validation
      - name: Run YAML Lint
        run: yamllint config.yaml || true

      - name: Run Dockerfile Lint
        run: dockerfilelint Dockerfile || true

      # Dashboard Build Validation
      - name: Build React Dashboard
        run: npm run build
