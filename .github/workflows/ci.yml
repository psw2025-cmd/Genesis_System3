name: CI - Governance & QA Guardian

on:
  push:
    branches: [ main, develop, fix/ci-syntax-errors-2026-05-27 ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        timeout-minutes: 8
        run: |
          python -m pip install --upgrade pip
          python -m pip install --timeout 60 --retries 3 -r requirements-ci.txt

      - name: Install Node.js dependencies
        timeout-minutes: 5
        run: |
          npm ci

      - name: Run Black report only
        run: black --check . || true

      - name: Run Flake8
        run: flake8 .

      - name: Run Isort report only
        run: isort --check-only . || true

      - name: Run ESLint report only
        run: npx eslint . || true

      - name: Run Mypy report only
        run: mypy . || true

      - name: Run Bandit report only
        continue-on-error: true
        run: |
          if [ -d core ]; then bandit -r core; else echo "core directory not found"; fi

      - name: Run Pip-Audit report only
        run: pip-audit --requirement requirements-ci.txt || true

      - name: Run Pytest hard gate
        timeout-minutes: 8
        run: pytest --maxfail=1 --disable-warnings -q

      - name: Run YAML Lint report only
        run: |
          if [ -f config.yaml ]; then yamllint config.yaml || true; else echo "config.yaml not found"; fi

      - name: Run Dockerfile Lint report only
        run: |
          if [ -f Dockerfile ]; then npx --yes dockerfilelint Dockerfile || true; else echo "Dockerfile not found"; fi

      - name: Build React Dashboard
        timeout-minutes: 8
        run: |
          if npm run | grep -q "build"; then npm run build; else echo "npm build script not found"; fi
