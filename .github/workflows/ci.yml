name: CI - Governance & QA Guardian

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        timeout-minutes: 8
        run: |
          python -m pip install --upgrade pip
          python -m pip install --timeout 60 --retries 3 -r requirements-ci.txt

      - name: Install Node.js dependencies
        run: |
          npm ci

      - name: Run Black
        run: black --check .

      - name: Run Flake8
        run: flake8 .

      - name: Run Isort
        run: isort --check-only .

      - name: Run ESLint
        run: npx eslint . || true

      - name: Run Mypy
        run: mypy . || true

      - name: Run Bandit
        run: |
          if [ -d core ]; then bandit -r core; else echo "core directory not found"; fi

      - name: Run Pip-Audit
        run: pip-audit --requirement requirements-ci.txt || true

      - name: Run Pytest
        run: pytest --maxfail=1 --disable-warnings -q

      - name: Run YAML Lint
        run: |
          if [ -f config.yaml ]; then yamllint config.yaml || true; else echo "config.yaml not found"; fi

      - name: Run Dockerfile Lint
        run: |
          if [ -f Dockerfile ]; then npx --yes dockerfilelint Dockerfile || true; else echo "Dockerfile not found"; fi

      - name: Build React Dashboard
        run: |
          if npm run | grep -q "build"; then npm run build; else echo "npm build script not found"; fi
