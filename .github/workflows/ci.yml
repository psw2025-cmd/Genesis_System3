name: Genesis System3 Global Safety CI

# Self-hosted Windows runner CI.
# Analyzer/Paper only. No live trading. No repo write-back from CI.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: global-safety-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SYSTEM3_MODE: analyze
  ANALYZE_MODE: "1"
  LIVE_TRADING_ENABLED: "0"
  SYSTEM3_LIVE_TRADING_ALLOWED: "0"
  SYSTEM3_REAL_ONLY: "1"
  DEFER_INSTRUMENT_WARMUP: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  workflow-policy-guard:
    name: BLOCKING - workflow policy and trading safety guard
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify workflow policy and trading safety
        shell: bash
        run: |
          set -euo pipefail

          echo "Scanning workflow files..."
          mapfile -t workflows < <(find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | sort)

          if [[ ${#workflows[@]} -eq 0 ]]; then
            echo "FAIL: no workflow files found"
            exit 1
          fi

          printf 'Workflow files found:\n'
          printf '  %s\n' "${workflows[@]}"

          test -f .github/workflows/ci.yml || { echo "FAIL: ci.yml missing"; exit 1; }

          echo "Checking CI permissions are read-only..."
          if grep -RInE "contents:[[:space:]]*write|actions:[[:space:]]*write|packages:[[:space:]]*write|pull-requests:[[:space:]]*write|issues:[[:space:]]*write" .github/workflows; then
            echo "FAIL: write permission found in workflow. CI must remain read-only."
            exit 1
          fi

          echo "Checking forbidden auto-write/deploy commands..."
          if grep -RInE "git[[:space:]]+p[u]sh|gh[[:space:]]+pr[[:space:]]+m[e]rge|gh[[:space:]]+r[e]lease|create-pull-r[e]quest|peter-evans/create-pull-r[e]quest|--auto-f[i]x|auto_f[i]x|autof[i]x" .github/workflows; then
            echo "FAIL: auto-fix/write-back behavior found in workflow."
            exit 1
          fi

          if grep -RInE "azure/webapps-d[e]ploy|aws-a[c]tions|google-github-actions/d[e]ploy|render d[e]ploy|flyctl d[e]ploy|railway [u]p|vercel --p[r]od|netlify d[e]ploy" .github/workflows; then
            echo "FAIL: cloud deploy command/action found in workflow."
            exit 1
          fi

          echo "Checking live trading is hard-disabled..."
          if grep -RInE "LIVE_TRADING_ENABLED:[[:space:]]*[\"']?(1|true|TRUE|yes|YES)[\"']?|SYSTEM3_LIVE_TRADING_ALLOWED:[[:space:]]*[\"']?(1|true|TRUE|yes|YES)[\"']?" .github/workflows; then
            echo "FAIL: live trading enabled inside workflow."
            exit 1
          fi

          grep -q 'LIVE_TRADING_ENABLED: "0"' .github/workflows/ci.yml || { echo "FAIL: LIVE_TRADING_ENABLED=0 missing from ci.yml"; exit 1; }
          grep -q 'SYSTEM3_LIVE_TRADING_ALLOWED: "0"' .github/workflows/ci.yml || { echo "FAIL: SYSTEM3_LIVE_TRADING_ALLOWED=0 missing from ci.yml"; exit 1; }

          echo "policy_guard=PASS"
          echo "trading_safety=PASS"

  architecture-trading-safety:
    name: BLOCKING - architecture and trading safety gate
    runs-on: self-hosted
    timeout-minutes: 10
    needs: workflow-policy-guard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run root architecture gate
        shell: bash
        run: |
          set -euo pipefail
          python --version
          test -f .github/scripts/root_architecture_gate.py
          python .github/scripts/root_architecture_gate.py
          echo "architecture_gate=PASS"

  python-compile-proof:
    name: BLOCKING - Python compile proof
    runs-on: self-hosted
    timeout-minutes: 5
    needs: workflow-policy-guard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile critical scripts
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile system3_control_plane.py
          python -m py_compile scripts/system3_full_repo_verification.py
          python -m py_compile scripts/system3_master_proof_orchestrator.py
          python -m py_compile scripts/system3_proof_pack_closure_gate.py
          echo "compile_proof=PASS"

  full-proof-pack-validation:
    name: BLOCKING - full proof pack validation
    runs-on: self-hosted
    timeout-minutes: 20
    needs: workflow-policy-guard
    env:
      SYSTEM3_MODE: analyze
      ANALYZE_MODE: "1"
      LIVE_TRADING_ENABLED: "0"
      SYSTEM3_LIVE_TRADING_ALLOWED: "0"
      SYSTEM3_REAL_ONLY: "1"
      DEFER_INSTRUMENT_WARMUP: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CI and backend dependencies
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python -m pip install --upgrade pip --quiet
          test -f requirements-ci.txt
          test -f dashboard/backend/requirements.txt
          python -m pip install --no-cache-dir -r requirements-ci.txt --quiet
          python -m pip install --no-cache-dir -r dashboard/backend/requirements.txt --quiet
          echo "deps_install=PASS"

      - name: Compile expanded critical scripts
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile system3_control_plane.py
          python -m py_compile system3_ultra.py
          python -m py_compile run_system3.py
          python -m py_compile .github/scripts/root_architecture_gate.py
          python -m py_compile scripts/system3_full_repo_verification.py
          python -m py_compile scripts/system3_master_proof_orchestrator.py
          python -m py_compile scripts/system3_issue_24_26_27_28_proof_batch.py
          python -m py_compile scripts/system3_proof_pack_closure_gate.py
          python -m py_compile dashboard/backend/app.py
          python -m py_compile scripts/paper_day_proof_pack.py
          python -m py_compile scripts/run_dashboard_browser_proof.py
          python -m py_compile scripts/daily_prediction_benchmark.py
          python -m py_compile scripts/repo_authority_audit.py
          python -m py_compile core/utils/nse_holidays.py
          python -m py_compile scripts/cloud_worker.py
          python -m py_compile core/engine/system3_phase82_job_scheduler.py
          python -m py_compile scripts/system3_self_healing_watchdog.py
          test -f dashboard/frontend/src/components/LiveTradingGate.tsx
          python -c "import json; json.load(open('config/system3_job_scheduler.json'))" && echo "scheduler_config_json=VALID"
          echo "compile_expanded=PASS"

      - name: Dashboard backend import smoke
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          os.environ["SYSTEM3_MODE"] = "analyze"
          os.environ["ANALYZE_MODE"] = "1"
          os.environ["LIVE_TRADING_ENABLED"] = "0"
          os.environ["SYSTEM3_LIVE_TRADING_ALLOWED"] = "0"
          os.environ["SYSTEM3_REAL_ONLY"] = "1"
          os.environ["DEFER_INSTRUMENT_WARMUP"] = "1"
          import dashboard.backend.app as app
          assert getattr(app, "app", None) is not None, "FastAPI app object missing"
          assert os.environ["LIVE_TRADING_ENABLED"] == "0", "LIVE_TRADING_ENABLED safety check failed"
          assert os.environ["SYSTEM3_LIVE_TRADING_ALLOWED"] == "0", "SYSTEM3_LIVE_TRADING_ALLOWED safety check failed"
          print("dashboard_backend_import_smoke=PASS")
          print("live_trading_safety_in_app=PASS")
          PY

      - name: Dashboard backend pytest suite
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest \
            tests/test_dashboard_app.py \
            tests/test_qc_validator_dhan_aliases.py \
            tests/test_qc_runtime_anomaly.py \
            tests/test_scheduler_catchup.py \
            -v --tb=short

      - name: Run proof batch
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/system3_issue_24_26_27_28_proof_batch.py
          python scripts/system3_issue_24_26_27_28_proof_batch.py
          test -d reports/latest/implementation_batch
          test -f reports/latest/implementation_batch/status_matrix.json
          test -f reports/latest/implementation_batch/unresolved_blockers.md
          echo "proof_batch=PASS"

      - name: Run proof pack closure gate
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/system3_proof_pack_closure_gate.py
          python scripts/system3_proof_pack_closure_gate.py
          test -f reports/latest/proof_pack_closure_gate/summary.json
          echo "proof_pack_closure_gate=PASS"

      - name: Upload proof pack artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system3-proof-pack-${{ github.run_number }}
          path: reports/latest/
          if-no-files-found: warn
          retention-days: 30

  frontend-build:
    name: BLOCKING - frontend production build
    runs-on: self-hosted
    timeout-minutes: 10
    needs: workflow-policy-guard
    defaults:
      run:
        working-directory: dashboard/frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 20 for reproducible frontend CI
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: npm ci --no-audit --no-fund

      - name: Build (vite build)
        shell: bash
        run: npm run build
