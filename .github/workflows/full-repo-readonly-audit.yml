name: Full Repo Read-Only Audit

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/full-repo-readonly-audit.yml

permissions:
  contents: read

jobs:
  full-repo-readonly-audit:
    name: Full repo read-only audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build read-only audit pack
        shell: bash
        run: |
          set -euo pipefail
          OUT="audit_artifacts/full_repo_readonly_$(date -u +%Y%m%dT%H%M%SZ)"
          mkdir -p "$OUT"
          echo "OUT=$OUT" >> "$GITHUB_ENV"

          {
            echo "# Full Repo Read-Only Audit"
            echo "Generated UTC: $(date -u --iso-8601=seconds)"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Branch: ${GITHUB_REF_NAME:-unknown}"
          } > "$OUT/00_summary.md"

          {
            echo "## Git"
            git status --short
            echo
            echo "## Last commit"
            git log -1 --stat
          } > "$OUT/01_git_status.txt"

          find . -path ./.git -prune -o -type f -print | sed 's#^./##' | sort > "$OUT/02_file_inventory.txt"
          wc -l "$OUT/02_file_inventory.txt" > "$OUT/03_file_count.txt"

          find . -path ./.git -prune -o -type f -printf '%s\t%TY-%Tm-%Td %TH:%TM\t%p\n' | sort -nr > "$OUT/04_file_sizes.tsv"

          if command -v sha256sum >/dev/null 2>&1; then
            while IFS= read -r f; do
              [ -f "$f" ] && sha256sum "$f" || true
            done < <(find . -path ./.git -prune -o -type f -print | sort) > "$OUT/05_sha256_all_files.txt"
          fi

          {
            echo "# Workflow files"
            find .github/workflows -maxdepth 1 -type f -print 2>/dev/null | sort || true
            echo
            echo "# Docker files"
            find . -iname '*dockerfile*' -o -name 'docker-compose*.yml' -o -name 'render.yaml' | sort || true
            echo
            echo "# Python entry candidates"
            find . -type f \( -name 'app.py' -o -name 'main.py' -o -name 'runner.py' -o -name '*orchestrator*.py' -o -name '*broker*.py' \) | sort || true
          } > "$OUT/06_runtime_candidates.txt"

          {
            echo "# Secret pattern scan - filenames and lines only, values redacted"
            grep -RInE '(api[_-]?key|secret|token|password|totp|mpin|private[_-]?key)' . \
              --exclude-dir=.git \
              --exclude='*.png' --exclude='*.jpg' --exclude='*.jpeg' --exclude='*.gif' --exclude='*.pdf' \
              2>/dev/null | sed -E 's/(=|:).*/=<REDACTED>/' | head -1000 || true
          } > "$OUT/07_secret_pattern_scan_redacted.txt"

          {
            echo "# Duplicate basename groups"
            find . -path ./.git -prune -o -type f -printf '%f\t%p\n' | sort | awk -F '\t' '{count[$1]++; paths[$1]=paths[$1]"\n  "$2} END {for (n in count) if (count[n]>1) print n" ("count[n]")" paths[n]"\n"}' | sort || true
          } > "$OUT/08_duplicate_basenames.txt"

          {
            echo "# Render deploy config"
            sed -n '1,140p' render.yaml 2>/dev/null || true
            echo
            echo "# Render workflow"
            sed -n '1,220p' .github/workflows/render-cli-deploy.yml 2>/dev/null || true
            echo
            echo "# Backend Dockerfile"
            sed -n '1,160p' dashboard/backend/Dockerfile 2>/dev/null || true
            echo
            echo "# Backend requirements"
            sed -n '1,160p' dashboard/backend/requirements.txt 2>/dev/null || true
          } > "$OUT/09_render_deploy_snapshot.txt"

          {
            echo "# Import smoke check"
            python --version
            python -m py_compile dashboard/backend/app.py && echo "dashboard/backend/app.py PY_COMPILE_PASS" || echo "dashboard/backend/app.py PY_COMPILE_FAIL"
          } > "$OUT/10_python_smoke.txt" 2>&1 || true

          (cd audit_artifacts && zip -r "$(basename "$OUT").zip" "$(basename "$OUT")")
          echo "ZIP_PATH=audit_artifacts/$(basename "$OUT").zip" >> "$GITHUB_ENV"

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-repo-readonly-audit
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error
          retention-days: 14
