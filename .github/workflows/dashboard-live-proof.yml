name: Dashboard Live UI Proof

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'dashboard/frontend/src/App.tsx'
      - 'dashboard/frontend/src/components/Sidebar.tsx'
      - 'dashboard/frontend/src/components/EndToEndProof.tsx'
      - 'dashboard/backend/**'
      - 'core/data/**'
      - 'tools/dashboard_live_ui_proof.mjs'
      - 'tools/permanent_live_log_watch.mjs'
      - '.github/workflows/dashboard-live-proof.yml'
  schedule:
    - cron: "*/30 3-10 * * 1-5"

permissions:
  contents: read

env:
  SYSTEM3_MODE: analyzer
  ANALYZE_MODE: '1'
  LIVE_TRADING_ENABLED: '0'
  SYSTEM3_LIVE_TRADING_ALLOWED: '0'
  SYSTEM3_REAL_ONLY: '1'

jobs:
  dashboard-live-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DASHBOARD_BASE_URL: https://genesis-system3-backend.onrender.com
      DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install chromium

      - name: Capture live dashboard proof
        run: node tools/dashboard_live_ui_proof.mjs

      - name: Permanent live log watch
        if: always()
        run: node tools/permanent_live_log_watch.mjs

      - name: Upload dashboard proof artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-live-ui-proof
          path: |
            reports/latest/dashboard_live_ui_proof/
            reports/latest/permanent_live_log_watch/
          retention-days: 14
