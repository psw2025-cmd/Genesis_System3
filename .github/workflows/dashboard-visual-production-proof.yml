name: Dashboard Visual Production Proof

on:
  workflow_dispatch:
  schedule:
    - cron: '15 * * * *'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/dashboard-visual-production-proof.yml'
      - '.github/workflows/system3-latest-truth-publish.yml'
      - '.github/workflows/options-ml-training-proof.yml'
      - 'tools/dashboard_live_ui_proof.mjs'
      - 'tools/permanent_live_log_watch.mjs'
      - 'tools/cloud_runtime_check.py'
      - 'dashboard/frontend/**'
      - 'dashboard/backend/**'
      - 'core/data/**'
      - 'core/brokers/**'
      - 'scripts/**'
      - 'config/**'
      - 'docs/SYSTEM3_PRODUCTION_GRADE_1000_POINT_QC_TODO.md'

permissions:
  contents: write

concurrency:
  group: dashboard-visual-production-proof
  cancel-in-progress: false

env:
  DASHBOARD_BASE_URL: https://genesis-system3-backend.onrender.com
  DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
  ANALYZE_MODE: '1'
  LIVE_TRADING_ENABLED: '0'
  SYSTEM3_LIVE_TRADING_ALLOWED: '0'

jobs:
  visual-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install isolated dashboard proof dependencies
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .proof-node
          cat > .proof-node/package.json <<'JSON'
          {"name":"system3-dashboard-visual-proof","private":true,"version":"1.0.0","dependencies":{"playwright":"1.52.0"}}
          JSON
          npm install --prefix .proof-node --no-audit --no-fund --ignore-scripts
          .proof-node/node_modules/.bin/playwright install chromium --with-deps
          ln -sfn "$PWD/.proof-node/node_modules" node_modules
      - name: Assert analyzer-only safety flags
        run: |
          test "$ANALYZE_MODE" = "1"
          test "$LIVE_TRADING_ENABLED" = "0"
          test "$SYSTEM3_LIVE_TRADING_ALLOWED" = "0"
      - name: Run dashboard screenshot proof
        id: live_proof
        continue-on-error: true
        run: node tools/dashboard_live_ui_proof.mjs
      - name: Build visual report from live proof truth
        if: always()
        run: |
          set -e
          python - <<'PY'
          import json, shutil
          from datetime import datetime, timezone
          from pathlib import Path

          out = Path('reports/latest/dashboard_visual_production_proof')
          src = Path('reports/latest/dashboard_live_ui_proof')
          shell_path = Path('reports/latest/dashboard_shell_diagnostic/summary.json')
          tracker_path = Path('reports/latest/dashboard_visible_issue_tracker/summary.json')
          shutil.rmtree(out, ignore_errors=True)
          (out / 'screenshots').mkdir(parents=True, exist_ok=True)

          names = [
              'truth.png', 'genesis.png', 'e2e_proof.png', 'overview.png',
              'chain.png', 'signals.png', 'paper.png', 'positions.png',
              'broker.png', 'performance.png', 'ml.png', 'gates.png',
              'mobile_390x844.png',
          ]
          rows = []
          for name in names:
              p = src / name
              ok = p.exists() and p.stat().st_size > 10000
              if ok:
                  shutil.copy2(p, out / 'screenshots' / name)
              rows.append({'file': name, 'ok': ok, 'size_bytes': p.stat().st_size if p.exists() else 0})

          def load_json(path):
              try:
                  return json.loads(path.read_text(encoding='utf-8')), None
              except Exception as exc:
                  return {}, f'{type(exc).__name__}: {exc}'

          def parse_time(value):
              if not value:
                  return None
              try:
                  return datetime.fromisoformat(str(value).replace('Z', '+00:00')).astimezone(timezone.utc)
              except Exception:
                  return None

          source, source_error = load_json(src / 'summary.json')
          shell, shell_error = load_json(shell_path)
          tracker, tracker_error = load_json(tracker_path)

          screenshot_gate = all(row['ok'] for row in rows)
          auth_ok = bool(source.get('auth', {}).get('ok'))
          source_verdict = source.get('final_verdict', 'MISSING')
          infra_blockers = list(source.get('infra_blockers') or [])
          visual_blockers = list(source.get('visual_blockers') or [])
          trade_readiness_blockers = list(source.get('trade_readiness_blockers') or [])
          consistency_blockers = []

          source_time = parse_time(source.get('generated_at'))
          shell_time = parse_time(shell.get('generated_at'))
          tracker_time = parse_time(tracker.get('generated_at'))
          max_age_seconds = 20 * 60

          if shell_error:
              consistency_blockers.append('SHELL_PROOF_MISSING_OR_INVALID')
          else:
              if shell.get('status') != 'PASS':
                  consistency_blockers.append(f"SHELL_STATUS:{shell.get('status', 'MISSING')}")
              if shell.get('deployed_asset_drift_detected') is True:
                  consistency_blockers.append('DEPLOYED_FRONTEND_ASSET_DRIFT')
              if shell.get('matched_tab_count') != shell.get('expected_tab_count'):
                  consistency_blockers.append(
                      f"TAB_COVERAGE:{shell.get('matched_tab_count', 0)}/{shell.get('expected_tab_count', 0)}"
                  )
              if source_time and shell_time and abs((source_time - shell_time).total_seconds()) > max_age_seconds:
                  consistency_blockers.append('SHELL_PROOF_NOT_TIME_ALIGNED')

          if tracker_error:
              consistency_blockers.append('VISIBLE_TRACKER_MISSING_OR_INVALID')
          else:
              if tracker.get('status') != 'PASS':
                  consistency_blockers.append(f"VISIBLE_TRACKER_STATUS:{tracker.get('status', 'MISSING')}")
              bad_tabs = [
                  str(tab.get('title') or tab.get('id') or 'unknown')
                  for tab in (tracker.get('tabs') or [])
                  if tab.get('ok') is not True
              ]
              if bad_tabs:
                  consistency_blockers.append(f"VISIBLE_TRACKER_BAD_TABS:{len(bad_tabs)}")
              if source_time and tracker_time and abs((source_time - tracker_time).total_seconds()) > max_age_seconds:
                  consistency_blockers.append('VISIBLE_TRACKER_NOT_TIME_ALIGNED')

          visual_gate_pass = (
              source_error is None
              and screenshot_gate
              and auth_ok
              and source_verdict == 'PASS'
              and not infra_blockers
              and not visual_blockers
              and not trade_readiness_blockers
              and not consistency_blockers
          )

          summary = {
              'generated_at': source.get('generated_at'),
              'base': source.get('base'),
              'visual_gate_pass': visual_gate_pass,
              'production_grade_claim_allowed': visual_gate_pass,
              'source_summary_ok': source_error is None,
              'source_summary_error': source_error,
              'source_final_verdict': source_verdict,
              'auth_ok': auth_ok,
              'screenshot_gate_pass': screenshot_gate,
              'infra_blockers': infra_blockers,
              'visual_blockers': visual_blockers,
              'trade_readiness_blockers': trade_readiness_blockers,
              'consistency_blockers': consistency_blockers,
              'corroborating_evidence': {
                  'shell_generated_at': shell.get('generated_at'),
                  'shell_status': shell.get('status'),
                  'shell_tab_coverage': f"{shell.get('matched_tab_count', 0)}/{shell.get('expected_tab_count', 0)}",
                  'visible_tracker_generated_at': tracker.get('generated_at'),
                  'visible_tracker_status': tracker.get('status'),
                  'visible_tracker_bad_tab_count': sum(1 for tab in (tracker.get('tabs') or []) if tab.get('ok') is not True),
              },
              'screenshots': rows,
              'safety': {
                  'analyze_mode': True,
                  'live_trading_enabled': False,
                  'system3_live_trading_allowed': False,
              },
          }
          (out / 'summary.json').write_text(json.dumps(summary, indent=2), encoding='utf-8')

          md = [
              '# Dashboard Visual Production Proof', '',
              f"Generated: {summary['generated_at']}",
              f"Base: {summary['base']}",
              f"Visual gate pass: **{summary['visual_gate_pass']}**",
              f"Production-grade claim allowed: **{summary['production_grade_claim_allowed']}**",
              f"Source verdict: **{summary['source_final_verdict']}**",
              f"Auth OK: **{summary['auth_ok']}**",
              f"Screenshot gate: **{summary['screenshot_gate_pass']}**", '',
              '## Blockers',
          ]
          blockers = infra_blockers + visual_blockers + trade_readiness_blockers + consistency_blockers
          md.extend([f'- {item}' for item in blockers] if blockers else ['- none'])
          md += ['', '## Corroborating evidence']
          for key, value in summary['corroborating_evidence'].items():
              md.append(f'- `{key}`: `{value}`')
          md += ['', '## Screenshots']
          for row in rows:
              md.append(f"- {'PASS' if row['ok'] else 'MISSING'} `{row['file']}` size=`{row['size_bytes']}`")
          md.append('')
          for row in rows:
              if row['ok']:
                  md += [f"## {row['file']}", '', f"![{row['file']}](screenshots/{row['file']})", '']
          (out / 'visual_proof.md').write_text('\n'.join(md), encoding='utf-8')
          PY
      - name: Validate analyzer-safe report contract
        if: always()
        run: |
          python - <<'PY'
          import json
          p = 'reports/latest/dashboard_visual_production_proof/summary.json'
          d = json.load(open(p, encoding='utf-8'))
          assert d['safety']['analyze_mode'] is True
          assert d['safety']['live_trading_enabled'] is False
          assert d['safety']['system3_live_trading_allowed'] is False
          assert d['production_grade_claim_allowed'] == d['visual_gate_pass']
          print(json.dumps({
              'visual_gate_pass': d['visual_gate_pass'],
              'source_final_verdict': d['source_final_verdict'],
              'auth_ok': d['auth_ok'],
              'screenshot_gate_pass': d['screenshot_gate_pass'],
              'infra_blockers': len(d['infra_blockers']),
              'visual_blockers': len(d['visual_blockers']),
              'trade_readiness_blockers': len(d['trade_readiness_blockers']),
              'consistency_blockers': len(d['consistency_blockers']),
          }, indent=2))
          PY
      - name: Commit visual proof with conflict retry
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/latest/dashboard_visual_production_proof/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci(proof): publish dashboard visual production proof [skip ci]"
          if git push; then exit 0; fi
          git pull --rebase origin main
          git push
      - name: Enforce current live visual gate
        if: always()
        run: |
          python - <<'PY'
          import json, sys
          data = json.load(open('reports/latest/dashboard_visual_production_proof/summary.json', encoding='utf-8'))
          sys.exit(0 if data.get('visual_gate_pass') is True else 1)
          PY
