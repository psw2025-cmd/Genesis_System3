name: Patch Render Secret Env Loader

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-render-secret-env-loader.yml

permissions:
  contents: write

concurrency:
  group: patch-render-secret-env-loader-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch-env-loader:
    name: Patch env loader for Render secret file
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch loader
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path('core/utils/env_loader.py')
          text = p.read_text(encoding='utf-8')
          old = '''# Project root: .../Genesis_System3
ROOT_DIR = os.path.abspath(os.path.join(os.path.dirname(__file__), "..", ".."))
ENV_PATH = os.path.join(ROOT_DIR, "config", ".env")

if os.path.exists(ENV_PATH):
    load_dotenv(ENV_PATH)
'''
          new = '''# Project root: .../Genesis_System3
ROOT_DIR = os.path.abspath(os.path.join(os.path.dirname(__file__), "..", ".."))
ENV_PATHS = [
    os.path.join(ROOT_DIR, "config", ".env"),
    os.getenv("SYSTEM3_ENV_FILE", ""),
    "/etc/secrets/.env",
]

for env_path in ENV_PATHS:
    if env_path and os.path.exists(env_path):
        load_dotenv(env_path, override=False)
'''
          if new in text:
              raise SystemExit(0)
          if old not in text:
              raise SystemExit('Expected env loader block not found; refusing broad edit')
          p.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Verify patch
        shell: bash
        run: |
          set -euo pipefail
          grep -n '/etc/secrets/.env' core/utils/env_loader.py
          python -m py_compile core/utils/env_loader.py

      - name: Commit patch if needed
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git rebase origin/main

          git add core/utils/env_loader.py

          if git diff --cached --quiet; then
            echo "No patch changes needed."
            exit 0
          fi

          git commit -m "fix: load Render secret env file"

          for i in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              echo "Push successful."
              exit 0
            fi
            echo "Push failed, retry $i/3 after remote update..."
            sleep 3
          done

          echo "Push failed after retries."
          exit 1
