name: Genesis System3 Main Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - requirements.txt
      - .github/workflows/main.yml
      - scripts/**
      - dashboard/backend/**
      - core/**
      - src/**

permissions:
  contents: read

jobs:
  validate-python:
    name: Validate Python dependencies and core scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SYSTEM3_MODE: analyze
      ANALYZE_MODE: "1"
      LIVE_TRADING_ENABLED: "0"
      SYSTEM3_LIVE_TRADING_ALLOWED: "0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: |
          python -m py_compile scripts/system3_full_repo_verification.py
          python -m py_compile scripts/system3_master_proof_orchestrator.py
          python scripts/system3_master_proof_orchestrator.py --auto-fix
