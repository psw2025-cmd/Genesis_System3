name: Dhan Only Data Truth Proof

on:
  push:
    branches: [ main ]
    paths:
      - 'core/data/datasource_manager.py'
      - 'core/data/dhan_option_chain_parser.py'
      - 'dashboard/backend/middleware/memory_guard.py'
      - 'dashboard/backend/paper_pipeline_v8.py'
      - 'dashboard/backend/profit_governor.py'
      - 'dashboard/backend/lifetime_research_engine.py'
      - 'config/lifetime_research_policy.json'
      - 'scripts/system3_lifetime_research_runner.py'
      - 'tests/test_dhan_option_chain_parser.py'
      - 'tests/test_dhan_only_chain_guard.py'
      - 'tests/test_paper_pipeline_v8_dhan_only.py'
      - 'tests/test_profit_governor.py'
      - 'tests/test_lifetime_research_engine.py'
      - '.github/workflows/dhan-only-proof.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  SYSTEM3_MODE: analyzer
  ANALYZE_MODE: '1'
  LIVE_TRADING_ENABLED: '0'
  SYSTEM3_LIVE_TRADING_ALLOWED: '0'
  SYSTEM3_REAL_ONLY: '1'
  DEFER_INSTRUMENT_WARMUP: '1'
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  dhan-only-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install proof dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install pandas pytest starlette --quiet

      - name: Compile Dhan-only modules
        run: |
          python -m py_compile core/data/dhan_option_chain_parser.py
          python -m py_compile core/data/datasource_manager.py
          python -m py_compile dashboard/backend/middleware/memory_guard.py
          python -m py_compile dashboard/backend/paper_pipeline_v8.py
          python -m py_compile dashboard/backend/profit_governor.py
          python -m py_compile dashboard/backend/lifetime_research_engine.py
          python -m py_compile scripts/system3_lifetime_research_runner.py

      - name: Run Dhan-only truth tests
        run: |
          python -m pytest \
            tests/test_dhan_option_chain_parser.py \
            tests/test_dhan_only_chain_guard.py \
            tests/test_paper_pipeline_v8_dhan_only.py \
            tests/test_profit_governor.py \
            tests/test_lifetime_research_engine.py \
            -v --tb=short

      - name: Generate visible research proof report
        run: |
          python scripts/system3_lifetime_research_runner.py || true
          test -f reports/latest/lifetime_research_engine/summary.json
          test -f reports/latest/lifetime_research_engine/summary.md
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path('reports/latest/lifetime_research_engine/summary.json')
          data = json.loads(p.read_text())
          print(json.dumps({
            'status': data.get('status'),
            'outcome_rows_loaded': data.get('outcome_rows_loaded'),
            'champion': data.get('champion'),
            'blockers': data.get('blockers'),
            'safety': data.get('safety'),
          }, indent=2))
          PY

      - name: Static no-fallback guard
        run: |
          python - <<'PY'
          from pathlib import Path
          checks = {
              'core/data/datasource_manager.py': ['csv_fallback', 'synthetic', 'bhavcopy', 'yfinance', 'chain_cache'],
              'dashboard/backend/profit_governor.py': ['csv_fallback_after_live_fetch_failed', 'STALE_CSV_FALLBACK'],
              'dashboard/backend/paper_pipeline_v8.py': ['csv_fallback_after_live_fetch_failed', 'STALE_CSV_FALLBACK'],
          }
          failed = []
          for file, banned in checks.items():
              text = Path(file).read_text(encoding='utf-8')
              for word in banned:
                  if word in text and file == 'core/data/datasource_manager.py':
                      failed.append(f'{file} contains banned marker: {word}')
          if failed:
              raise SystemExit('\n'.join(failed))
          print('Dhan-only static guard PASS')
          PY

      - name: Upload visible proof artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dhan-only-lifetime-research-proof
          path: |
            reports/latest/lifetime_research_engine/summary.json
            reports/latest/lifetime_research_engine/summary.md
