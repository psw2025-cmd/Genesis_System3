name: Render Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - render.yaml
      - dashboard/backend/**
      - .github/workflows/render-cli-deploy.yml

permissions:
  contents: read

concurrency:
  group: render-deploy-backend
  cancel-in-progress: false

jobs:
  deploy-render-backend:
    name: Deploy backend on Render
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.RENDER_API_KEY }}" || (echo "Missing GitHub secret: RENDER_API_KEY" && exit 1)
          test -n "${{ secrets.RENDER_SERVICE_ID }}" || (echo "Missing GitHub secret: RENDER_SERVICE_ID" && exit 1)
          echo "Render secrets presence check PASS"

      - name: Trigger Render deploy and wait for final status
        shell: bash
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          http_code=$(curl -sS -o /tmp/render_deploy_response.json -w "%{http_code}" \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP_STATUS=$http_code"
          cat /tmp/render_deploy_response.json
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi

          deploy_id=$(python - <<'PY'
          import json
          data=json.load(open('/tmp/render_deploy_response.json'))
          print(data.get('id',''))
          PY
          )
          if [ -z "$deploy_id" ]; then
            echo "Render deploy id not found"
            exit 1
          fi
          echo "RENDER_DEPLOY_ID=$deploy_id"

          for attempt in $(seq 1 60); do
            status_code=$(curl -sS -o /tmp/render_deploy_status.json -w "%{http_code}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json")
            echo "POLL_ATTEMPT=$attempt HTTP_STATUS=$status_code"
            cat /tmp/render_deploy_status.json
            if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
              exit 1
            fi
            status=$(python - <<'PY'
            import json
            data=json.load(open('/tmp/render_deploy_status.json'))
            print(str(data.get('status','')).lower())
            PY
            )
            echo "RENDER_DEPLOY_STATUS=$status"
            case "$status" in
              live|succeeded|success|deployed)
                echo "RENDER_DEPLOY_PASS"
                exit 0
                ;;
              build_failed|update_failed|pre_deploy_failed|canceled|cancelled|failed)
                echo "RENDER_DEPLOY_FAIL"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "RENDER_DEPLOY_TIMEOUT"
          exit 1

      - name: Render deployment proof URLs
        shell: bash
        run: |
          set -euo pipefail
          echo "Backend root: https://genesis-system3-backend.onrender.com/"
          echo "Backend docs: https://genesis-system3-backend.onrender.com/docs"
          echo "Backend health: https://genesis-system3-backend.onrender.com/api/health"
          echo "Backend state: https://genesis-system3-backend.onrender.com/api/state"
