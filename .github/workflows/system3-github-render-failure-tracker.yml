name: System3 GitHub Render Failure Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/system3-github-render-failure-tracker.yml'
      - 'tools/system3_github_render_failure_tracker.py'
      - 'scripts/cloud_worker.py'
      - 'render.yaml'
      - 'docs/SYSTEM3_DHAN_TOKEN_UPDATE_NOTE.md'

permissions:
  contents: write
  actions: read

# Do not cancel in-progress tracker runs. Earlier fast failures/cancellations can
# look like a storm and hide the real Render/worker/Dhan blocker being reported.
concurrency:
  group: system3-github-render-failure-tracker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  github-render-failure-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ github.token }}
      DASHBOARD_BASE_URL: https://genesis-system3-backend.onrender.com
      SYSTEM3_RENDER_TRACKER_EXCLUDE_WORKFLOWS: System3 GitHub Render Failure Tracker
      SYSTEM3_RENDER_TRACKER_ENDPOINT_TIMEOUT_S: '12'
      SYSTEM3_RENDER_TRACKER_GITHUB_TIMEOUT_S: '12'
      LIVE_TRADING_ENABLED: '0'
      SYSTEM3_LIVE_TRADING_ALLOWED: '0'
      ANALYZE_MODE: '1'
    steps:
      - uses: actions/checkout@v4
        timeout-minutes: 2
      - uses: actions/setup-python@v5
        timeout-minutes: 2
        with:
          python-version: '3.11'
      - name: Preflight non-secret diagnostics
        run: |
          mkdir -p reports/latest/github_render_failure_tracker docs
          python - <<'PY'
          import json, os, pathlib, sys, urllib.request, urllib.error
          rate_limit={"available": False}
          try:
              req=urllib.request.Request(
                  'https://api.github.com/rate_limit',
                  headers={
                      'Accept':'application/vnd.github+json',
                      'Authorization': 'Bearer ' + os.environ.get('GITHUB_TOKEN',''),
                      'X-GitHub-Api-Version':'2022-11-28',
                      'User-Agent':'system3-github-render-failure-tracker-preflight',
                  }
              )
              with urllib.request.urlopen(req, timeout=8) as resp:
                  body=json.loads(resp.read().decode('utf-8'))
                  core=body.get('resources',{}).get('core',{})
                  actions=body.get('resources',{}).get('actions_runner_registration',{})
                  rate_limit={
                      'available': True,
                      'core_remaining': core.get('remaining'),
                      'core_limit': core.get('limit'),
                      'core_reset': core.get('reset'),
                      'actions_runner_registration_remaining': actions.get('remaining'),
                  }
          except Exception as exc:
              rate_limit={'available': False, 'error_type': type(exc).__name__}
          payload={
            'python': sys.version.split()[0],
            'github_repository': os.environ.get('GITHUB_REPOSITORY'),
            'github_token_present': bool(os.environ.get('GITHUB_TOKEN')),
            'dashboard_base_url_present': bool(os.environ.get('DASHBOARD_BASE_URL')),
            'rate_limit': rate_limit,
            'live_trading_enabled': os.environ.get('LIVE_TRADING_ENABLED'),
            'system3_live_trading_allowed': os.environ.get('SYSTEM3_LIVE_TRADING_ALLOWED'),
            'analyze_mode': os.environ.get('ANALYZE_MODE'),
          }
          pathlib.Path('reports/latest/github_render_failure_tracker/preflight.json').write_text(json.dumps(payload, indent=2), encoding='utf-8')
          print(json.dumps(payload, indent=2))
          PY
      - name: Track GitHub workflow and Render failures
        id: tracker
        continue-on-error: true
        run: python tools/system3_github_render_failure_tracker.py
      - name: Ensure tracker summary exists even after crash
        if: always()
        run: |
          mkdir -p reports/latest/github_render_failure_tracker docs
          if [ ! -f reports/latest/github_render_failure_tracker/summary.json ]; then
            python - <<'PY'
            import json, pathlib, datetime
            out=pathlib.Path('reports/latest/github_render_failure_tracker')
            payload={
              'generated_utc': datetime.datetime.utcnow().replace(microsecond=0).isoformat()+'Z',
              'status': 'BLOCKED',
              'tracker_internal_status': 'FAILED_BEFORE_SUMMARY',
              'todo': ['Tracker script failed before summary.json was written; inspect checkout/setup/preflight/tracker step logs.'],
              'todo_count': 1,
              'github_failed_count': None,
              'render_failed_count': None,
              'live_trading_enabled': False,
              'order_routes_called': False,
              'secrets_printed': False,
              'report_only_no_self_failure_storm': True,
            }
            out.joinpath('summary.json').write_text(json.dumps(payload, indent=2), encoding='utf-8')
            out.joinpath('summary.md').write_text('# System3 GitHub + Render Failure TODO\n\nStatus: **BLOCKED**\n\nTracker failed before writing normal summary. Inspect workflow step logs.\n', encoding='utf-8')
            pathlib.Path('docs/SYSTEM3_GITHUB_RENDER_FAILURE_TODO.md').write_text(out.joinpath('summary.md').read_text(encoding='utf-8'), encoding='utf-8')
            print(json.dumps(payload, indent=2))
            PY
          fi
      - name: Commit GitHub Render failure TODO
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/github_render_failure_tracker/ docs/SYSTEM3_GITHUB_RENDER_FAILURE_TODO.md || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci(proof): update github render failure todo [skip ci]"
          git pull --rebase origin main || true
          git push || echo "WARN: git push failed; report remains in this run artifact/log and will retry next run."
      - name: Report tracker status without creating failure storm
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib
          p=pathlib.Path('reports/latest/github_render_failure_tracker/summary.json')
          if not p.exists():
              print('tracker summary missing even after fallback; workflow infrastructure failure')
              raise SystemExit(0)
          data=json.load(open(p, encoding='utf-8'))
          print(json.dumps({
              'tracker_status': data.get('status'),
              'tracker_internal_status': data.get('tracker_internal_status'),
              'github_failed_count': data.get('github_failed_count'),
              'render_failed_count': data.get('render_failed_count'),
              'todo_count': data.get('todo_count'),
              'excluded_workflows': data.get('excluded_workflows'),
              'live_trading_enabled': data.get('live_trading_enabled'),
              'order_routes_called': data.get('order_routes_called'),
              'note': 'Report-only workflow: blockers are written to TODO; this tracker does not fail itself solely because it detected blockers.'
          }, indent=2))
          raise SystemExit(0)
          PY
