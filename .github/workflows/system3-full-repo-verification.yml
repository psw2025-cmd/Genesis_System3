name: System3 Full Repo Verification

on:
  workflow_dispatch:
  schedule:
    - cron: "41 2 * * *"

permissions:
  contents: write

concurrency:
  group: system3-full-repo-verification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-repo-verification:
    name: Full backend frontend repo verification
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SYSTEM3_MODE: analyze
      ANALYZE_MODE: "1"
      LIVE_TRADING_ENABLED: "0"
      SYSTEM3_LIVE_TRADING_ALLOWED: "0"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Synchronize main before generating reports
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Setup Node for frontend evidence
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: dashboard/frontend/package-lock.json
        continue-on-error: true

      - name: Install frontend dependencies if lockfile exists
        shell: bash
        run: |
          set -euo pipefail
          if [ -f dashboard/frontend/package-lock.json ]; then
            (cd dashboard/frontend && npm ci)
          else
            echo "No dashboard/frontend/package-lock.json found; skipping npm ci."
          fi
        continue-on-error: true

      - name: Run full repo verification collector
        shell: bash
        run: |
          set -euo pipefail
          python --version
          python scripts/system3_full_repo_verification.py

      - name: Show full repo verification summary
        shell: bash
        run: |
          set -euo pipefail
          cat reports/latest/full_repo_verification/README.md
          echo
          cat reports/latest/full_repo_verification/summary.json

      - name: Zip full repo verification artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit_artifacts
          ZIP="audit_artifacts/system3_full_repo_verification_$(date -u +%Y%m%dT%H%M%SZ).zip"
          (cd reports/latest && zip -r "../../$ZIP" full_repo_verification)
          echo "ZIP_PATH=$ZIP" >> "$GITHUB_ENV"

      - name: Upload full repo verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: system3-full-repo-verification
          path: audit_artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Commit latest full repo verification reports
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reports/latest/full_repo_verification

          if git diff --cached --quiet; then
            echo "No full repo verification changes to commit."
            exit 0
          fi

          git commit -m "audit: publish full repo verification report [skip ci]"

          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Push successful."
              exit 0
            fi
            echo "Push failed, retry $i/3 after remote update..."
            sleep 3
          done

          echo "Push failed after retries."
          exit 1
