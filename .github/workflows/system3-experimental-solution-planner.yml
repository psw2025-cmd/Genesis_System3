name: System3 Experimental Solution Planner

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/system3-experimental-solution-planner.yml'
      - 'tools/system3_experimental_solution_planner.py'
      - 'reports/latest/**'
      - 'docs/**'
  workflow_run:
    workflows:
      - System3 Render 100 Agent Swarm
      - System3 Autopilot Proof Board
      - Dashboard Visible Issue Tracker
      - System3 Workflow Failure Tracker
      - System3 1000 Point TODO Status Updater
    types:
      - completed

permissions:
  contents: write

jobs:
  plan-solutions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LIVE_TRADING_ENABLED: '0'
      SYSTEM3_LIVE_TRADING_ALLOWED: '0'
      ANALYZE_MODE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build experimental solution plan
        run: python tools/system3_experimental_solution_planner.py || true
      - name: Commit solution plan
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/experimental_solution_planner/ docs/SYSTEM3_EXPERIMENTAL_SOLUTION_PLAN.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci(planner): update experimental solution plan [skip ci]"
          git push
      - name: Enforce no unresolved plan issues
        run: |
          python - <<'PY'
          import json
          data=json.load(open('reports/latest/experimental_solution_planner/summary.json',encoding='utf-8'))
          print(json.dumps(data, indent=2)[:10000])
          raise SystemExit(0 if data.get('status') == 'PASS' else 1)
          PY
