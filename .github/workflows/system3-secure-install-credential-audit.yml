name: System3 Secure Install Credential Audit

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/system3-secure-install-credential-audit.yml'
      - 'tools/system3_secure_install_credential_audit.py'
      - 'requirements.txt'
      - 'dashboard/backend/**'
      - 'dashboard/frontend/**'
      - 'docs/SYSTEM3_360_ROOT_CAUSE_BLOCKERS.md'
  workflow_run:
    workflows:
      - System3 Workflow Failure Tracker
      - Dashboard Visible Issue Tracker
      - System3 1000 Point TODO Status Updater
    types:
      - completed

permissions:
  contents: write

jobs:
  secure-install-credential-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      LIVE_TRADING_ENABLED: '0'
      SYSTEM3_LIVE_TRADING_ALLOWED: '0'
      ANALYZE_MODE: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install minimal audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install fastapi pydantic requests pytz
      - name: Run secure install credential audit
        run: python tools/system3_secure_install_credential_audit.py
      - name: Commit secure audit report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/secure_install_credential_audit/ docs/SYSTEM3_360_ROOT_CAUSE_BLOCKERS.md
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci(audit): update secure install credential audit [skip ci]"
          git push
      - name: Enforce secure audit blockers
        run: |
          python - <<'PY'
          import json
          data=json.load(open('reports/latest/secure_install_credential_audit/summary.json', encoding='utf-8'))
          print(json.dumps(data, indent=2)[:6000])
          raise SystemExit(0 if data.get('status') == 'PASS' else 1)
          PY
