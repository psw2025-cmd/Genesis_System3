name: Safe Dryrun Validation Execution Proof

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  safe-dryrun-validation-execution:
    name: Execute safe validation candidates without broker login
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SYSTEM3_MODE: analyzer
      ANALYZE_MODE: "1"
      LIVE_TRADING_ENABLED: "0"
      SYSTEM3_LIVE_TRADING_ALLOWED: "0"
      SYSTEM3_REAL_ONLY: "1"
      CI_SAFE_DRYRUN: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install minimal dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f dashboard/backend/requirements.txt ]; then
            python -m pip install -r dashboard/backend/requirements.txt
          fi
          python -m pip install requests pandas numpy || true

      - name: Run safe dry-run probes
        shell: bash
        run: |
          set -euo pipefail
          OUT="reports/latest/safe_dryrun_validation_execution"
          rm -rf "$OUT"
          mkdir -p "$OUT/logs"

          cat > "$OUT/00_summary.md" <<'EOF'
          # Safe Dryrun Validation Execution Proof

          Mode: analyzer/paper only. Live trading disabled. This workflow does not place orders and does not require broker secrets.
          EOF

          python - <<'PY' > "$OUT/01_candidate_execution_plan.json"
          import json
          candidates = [
              {'path': 'final_system_validation_test.py', 'commands': [['python', 'final_system_validation_test.py']]},
              {'path': 'production_grade_validation.py', 'commands': [['python', 'production_grade_validation.py', '--help'], ['python', 'production_grade_validation.py']]},
              {'path': 'system3_pre_autorun_validation.py', 'commands': [['python', 'system3_pre_autorun_validation.py', '--help'], ['python', 'system3_pre_autorun_validation.py']]},
              {'path': 'complete_end_to_end_validation.py', 'commands': [['python', 'complete_end_to_end_validation.py', '--help'], ['python', 'complete_end_to_end_validation.py']]},
          ]
          print(json.dumps({'candidates': candidates}, indent=2))
          PY

          python - <<'PY' > "$OUT/02_execution_summary.json"
          import json, os, subprocess, time
          from pathlib import Path
          env = os.environ.copy()
          env.update({
              'SYSTEM3_MODE': 'analyzer',
              'ANALYZE_MODE': '1',
              'LIVE_TRADING_ENABLED': '0',
              'SYSTEM3_LIVE_TRADING_ALLOWED': '0',
              'SYSTEM3_REAL_ONLY': '1',
              'CI_SAFE_DRYRUN': '1',
          })
          commands = [
              ['python', 'final_system_validation_test.py'],
              ['python', 'production_grade_validation.py', '--help'],
              ['python', 'system3_pre_autorun_validation.py', '--help'],
              ['python', 'complete_end_to_end_validation.py', '--help'],
          ]
          results = []
          logdir = Path('reports/latest/safe_dryrun_validation_execution/logs')
          logdir.mkdir(parents=True, exist_ok=True)
          for idx, cmd in enumerate(commands, 1):
              started = time.time()
              name = '_'.join(cmd).replace('/', '_').replace('\\', '_').replace('-', '_')[:80]
              log_path = logdir / f'{idx:02d}_{name}.log'
              item = {'command': cmd, 'log': str(log_path)}
              if not Path(cmd[1]).exists():
                  item.update({'rc': None, 'ok': False, 'error': 'file_missing'})
                  results.append(item)
                  continue
              try:
                  proc = subprocess.run(cmd, env=env, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, timeout=90)
                  log_path.write_text(proc.stdout[-12000:], encoding='utf-8', errors='replace')
                  item.update({'rc': proc.returncode, 'ok': proc.returncode == 0, 'elapsed_ms': int((time.time()-started)*1000)})
              except subprocess.TimeoutExpired as exc:
                  out = (exc.stdout or '') if isinstance(exc.stdout, str) else ''
                  log_path.write_text(out[-12000:] + '\nTIMEOUT_AFTER_90_SECONDS\n', encoding='utf-8', errors='replace')
                  item.update({'rc': 'timeout', 'ok': False, 'elapsed_ms': int((time.time()-started)*1000)})
              results.append(item)
          summary = {
              'mode': 'safe_dryrun_no_broker_no_orders',
              'commands_total': len(results),
              'commands_ok': sum(1 for r in results if r.get('ok')),
              'commands_failed': sum(1 for r in results if not r.get('ok')),
              'results': results,
              'trade_ready': False,
              'verdict': 'DRYRUN_EXECUTION_PROOF_ONLY_NOT_TRADE_READY',
          }
          print(json.dumps(summary, indent=2, sort_keys=True))
          PY

          cat "$OUT/02_execution_summary.json"

      - name: Commit safe dryrun proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/safe_dryrun_validation_execution
          if git diff --cached --quiet; then
            echo "No safe dryrun proof changes to commit."
          else
            git commit -m "audit: publish safe dryrun validation execution proof"
            git push
          fi
