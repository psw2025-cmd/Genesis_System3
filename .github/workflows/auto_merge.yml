name: Auto Merge — Cloud Pipeline

# Triggers:
#   - Any push to an auto/* branch (validates + merges if from local workflow)
#   - Any PR opened/updated targeting main from auto/* branches
on:
  push:
    branches:
      - 'auto/**'
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ─── CI: validate code quality ─────────────────────────────────────────────
  validate:
    name: Validate — Tests & Syntax
    runs-on: ubuntu-latest
    if: |
      startsWith(github.head_ref, 'auto/') ||
      startsWith(github.ref, 'refs/heads/auto/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install pytest scipy pandas numpy || true

      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short 2>/dev/null \
            && echo "✅ Tests PASSED" \
            || echo "⚠️  Tests FAILED or not found (non-blocking)"
        continue-on-error: true

      - name: Syntax check
        run: |
          find . -name "*.py" -not -path "./.git/*" \
            -exec python -m py_compile {} \; \
            && echo "✅ Syntax OK" \
            || echo "⚠️  Syntax errors found"
        continue-on-error: true

  # ─── Auto-merge: merge approved auto/* PRs ─────────────────────────────────
  auto-merge:
    name: Auto-Merge PR
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'auto/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge PR (admin bypass)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "🔀 Auto-merging PR #${PR_NUMBER}: ${PR_TITLE}"
          gh pr merge "${PR_NUMBER}" \
            --squash \
            --admin \
            --subject "${PR_TITLE}" \
            --delete-branch \
          && echo "✅ Merged PR #${PR_NUMBER}" \
          || echo "⚠️  Merge via Actions skipped (may already be merged by local workflow)"

      - name: Comment on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "${PR_NUMBER}" \
            --body "🤖 **Auto-merge complete** — Genesis System3 cloud pipeline merged this PR automatically. No manual review required." \
          || true

  # ─── Auto-tag: create version tag after merge ──────────────────────────────
  auto-tag:
    name: Auto-Tag Version
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version from semver.json
        id: version
        run: |
          if [ -f "state/semver.json" ]; then
            MAJOR=$(python -c "import json; d=json.load(open('state/semver.json')); print(d.get('major',1))")
            MINOR=$(python -c "import json; d=json.load(open('state/semver.json')); print(d.get('minor',0))")
            PATCH=$(python -c "import json; d=json.load(open('state/semver.json')); print(d.get('patch',0))")
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          else
            # Fallback: increment latest tag patch
            LATEST=$(git tag --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then VERSION="v1.0.0"; else
              VERSION=$(echo $LATEST | python -c "
          import sys,re
          t=sys.stdin.read().strip()
          m=re.match(r'v?(\d+)\.(\d+)\.(\d+)',t)
          if m: print(f'v{m.group(1)}.{m.group(2)}.{int(m.group(3))+1}')
          else: print('v1.0.1')
          ")
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

      - name: Create tag if not exists
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if git tag | grep -qx "${VERSION}"; then
            echo "Tag ${VERSION} already exists — skipping."
          else
            git config user.email "auto@genesis-system3.ai"
            git config user.name "Genesis Auto Workflow"
            git tag -a "${VERSION}" -m "Release ${VERSION} — ${COMMIT_MSG}"
            git push origin "${VERSION}"
            echo "✅ Tagged ${VERSION}"
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --notes "### Auto-release — Genesis System3

          **Commit:** ${COMMIT_MSG}
          **Branch:** main
          **Generated by:** Git Auto Workflow

          See CHANGE_LOG.md for full details." \
          || echo "⚠️  Release already exists or failed (non-blocking)"
