name: Run Backend Root URL Patcher

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/patch_backend_root_urls.py
      - .github/workflows/run-backend-root-url-patcher.yml

permissions:
  contents: write

jobs:
  patch-root-urls:
    name: Patch backend root URLs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run patcher
        shell: bash
        run: |
          set -euo pipefail
          python scripts/patch_backend_root_urls.py
          grep -n "PUBLIC_BACKEND_URL" dashboard/backend/app.py
          grep -n "relative_paths" dashboard/backend/app.py
          python -m py_compile dashboard/backend/app.py

      - name: Commit patched backend if changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- dashboard/backend/app.py; then
            echo "No backend root URL changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/backend/app.py
          git commit -m "fix: use production-safe root endpoint URLs"
          git push
