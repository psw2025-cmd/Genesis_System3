name: GCP Cloud Run Backend Proof

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Set to true only after dry-run proof passes"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      gcp_project_id:
        description: "GCP project ID"
        required: true
        type: string
      gcp_region:
        description: "Cloud Run region"
        required: true
        default: "asia-south1"
        type: string
      artifact_registry_repo:
        description: "Artifact Registry Docker repository"
        required: true
        default: "system3"
        type: string
      cloud_run_service:
        description: "Cloud Run backend service name"
        required: true
        default: "system3-backend"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  gcp-cloud-run-backend-proof:
    name: Manual GCP Cloud Run backend proof
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Repository path proof
        shell: bash
        run: |
          set -euo pipefail
          test ! -d backend
          test ! -f backend/Dockerfile
          test -d dashboard/backend
          test -f dashboard/backend/Dockerfile
          test -f dashboard/backend/app.py
          test -f .dockerignore
          echo "Backend path proof PASS"

      - name: Runtime safety proof
        shell: bash
        run: |
          set -euo pipefail
          echo "SYSTEM3_REAL_ONLY=1" >> "$GITHUB_ENV"
          echo "SYSTEM3_ANALYZE_MODE=1" >> "$GITHUB_ENV"
          echo "SYSTEM3_LIVE_TRADING=0" >> "$GITHUB_ENV"
          echo "PAPER_TRADING=1" >> "$GITHUB_ENV"
          echo "Runtime mode forced to analyzer/paper for deploy proof"

      - name: Build backend container locally
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -t system3-backend:gcp-proof \
            -f dashboard/backend/Dockerfile \
            .
          echo "Local Docker build PASS"

      - name: Dry-run summary
        if: ${{ inputs.deploy_mode == 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "GCP deploy mode is false. No deployment performed."
          echo "Required future secrets/identity: GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT"

      - name: Authenticate to Google Cloud
        if: ${{ inputs.deploy_mode == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        if: ${{ inputs.deploy_mode == 'true' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: ${{ inputs.deploy_mode == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${{ inputs.gcp_region }}-docker.pkg.dev" --quiet

      - name: Build and push backend image to Artifact Registry
        if: ${{ inputs.deploy_mode == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ inputs.gcp_region }}-docker.pkg.dev/${{ inputs.gcp_project_id }}/${{ inputs.artifact_registry_repo }}/system3-backend:${{ github.sha }}"
          docker build -t "$IMAGE" -f dashboard/backend/Dockerfile .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy backend to Cloud Run
        if: ${{ inputs.deploy_mode == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          gcloud run deploy "${{ inputs.cloud_run_service }}" \
            --image "$IMAGE" \
            --project "${{ inputs.gcp_project_id }}" \
            --region "${{ inputs.gcp_region }}" \
            --platform managed \
            --no-allow-unauthenticated \
            --set-env-vars "SYSTEM3_REAL_ONLY=1,SYSTEM3_ANALYZE_MODE=1,SYSTEM3_LIVE_TRADING=0,PAPER_TRADING=1" \
            --quiet
