name: Patch Render Root URLs and SmartAPI Dependency

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-render-root-and-smartapi.yml

permissions:
  contents: write

jobs:
  patch-render-root-and-smartapi:
    name: Patch backend root response and dependency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply safe targeted patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          app_path = Path('dashboard/backend/app.py')
          req_path = Path('dashboard/backend/requirements.txt')

          text = app_path.read_text(encoding='utf-8')
          old = '''# Root route - helpful message
@app.get("/")
async def root():
    return {
        "message": "System3 Ultra Dashboard API",
        "status": "running",
        "dashboard_url": "http://localhost:3000",
        "api_docs": "http://localhost:8000/docs",
        "health": "http://localhost:8000/api/health",
        "state": "http://localhost:8000/api/state",
    }
'''
          new = '''# Root route - helpful message
@app.get("/")
async def root():
    base_url = os.environ.get("PUBLIC_BACKEND_URL", "https://genesis-system3-backend.onrender.com").rstrip("/")
    return {
        "message": "System3 Ultra Dashboard API",
        "status": "running",
        "backend_url": base_url,
        "dashboard_url": os.environ.get("PUBLIC_DASHBOARD_URL", base_url),
        "api_docs": f"{base_url}/docs",
        "health": f"{base_url}/api/health",
        "state": f"{base_url}/api/state",
        "relative_paths": {
            "api_docs": "/docs",
            "health": "/api/health",
            "state": "/api/state",
        },
    }
'''
          if old not in text:
              raise SystemExit('Expected root endpoint block not found; refusing broad edit')
          app_path.write_text(text.replace(old, new), encoding='utf-8')

          req = req_path.read_text(encoding='utf-8') if req_path.exists() else ''
          lines = [line.strip() for line in req.splitlines()]
          if not any(line.split('==')[0].split('>=')[0].strip().lower() == 'smartapi-python' for line in lines):
              if req and not req.endswith('\n'):
                  req += '\n'
              req += 'smartapi-python>=1.5.5\n'
              req_path.write_text(req, encoding='utf-8')
          PY

      - name: Verify targeted patch
        shell: bash
        run: |
          set -euo pipefail
          grep -n "PUBLIC_BACKEND_URL" dashboard/backend/app.py
          grep -n "genesis-system3-backend.onrender.com" dashboard/backend/app.py
          grep -n "smartapi-python" dashboard/backend/requirements.txt
          python -m py_compile dashboard/backend/app.py

      - name: Commit patch if needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- dashboard/backend/app.py dashboard/backend/requirements.txt; then
            echo "No patch changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/backend/app.py dashboard/backend/requirements.txt
          git commit -m "fix: use Render URLs and add SmartAPI backend dependency"
          git push
