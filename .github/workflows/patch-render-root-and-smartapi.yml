name: Patch Render Root URLs and Dhan Dependency

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-render-root-and-smartapi.yml

permissions:
  contents: write

jobs:
  patch-render-root:
    name: Patch backend root response and verify Dhan dependency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Dhan dependency and root URL
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          req_path = Path('dashboard/backend/requirements.txt')
          req = req_path.read_text(encoding='utf-8') if req_path.exists() else ''
          lines = [line.strip() for line in req.splitlines()]
          if not any(line.split('==')[0].split('>=')[0].strip().lower() == 'dhanhq' for line in lines):
              raise SystemExit('dhanhq not found in requirements.txt — add dhanhq>=2.2.0')

          app_path = Path('dashboard/backend/app.py')
          text = app_path.read_text(encoding='utf-8')
          if 'genesis-system3-backend.onrender.com' not in text:
              raise SystemExit('Render URL not found in app.py')
          PY

      - name: Compile check
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile dashboard/backend/app.py
          echo "app.py compile: PASS"
          grep -n "dhanhq" dashboard/backend/requirements.txt
          echo "dhanhq dependency: PRESENT"
