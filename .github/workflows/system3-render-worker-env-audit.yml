name: System3 Render Worker Env Audit

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/system3-render-worker-env-audit.yml'
      - 'tools/system3_render_worker_env_audit.py'
      - 'scripts/cloud_worker.py'
      - 'render.yaml'
      - 'docs/SYSTEM3_DHAN_TOKEN_UPDATE_NOTE.md'

permissions:
  contents: write

concurrency:
  group: system3-render-worker-env-audit
  cancel-in-progress: true

jobs:
  worker-env-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
      DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
      DHAN_APP_ID: ${{ secrets.DHAN_APP_ID }}
      DHAN_APP_SECRET: ${{ secrets.DHAN_APP_SECRET }}
      DHAN_PIN: ${{ secrets.DHAN_PIN }}
      DHAN_TOTP_SECRET: ${{ secrets.DHAN_TOTP_SECRET }}
      WORKER_PUSH_TOKEN: ${{ secrets.WORKER_PUSH_TOKEN }}
      DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
      WEB_SERVICE_URL: https://genesis-system3-backend.onrender.com
      LIVE_TRADING_ENABLED: '0'
      SYSTEM3_LIVE_TRADING_ALLOWED: '0'
      ANALYZE_MODE: '1'
      SYSTEM3_MODE: analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run worker env audit
        run: python tools/system3_render_worker_env_audit.py || true
      - name: Commit worker audit report
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/render_worker_env_audit/ || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci(worker): update render worker env audit [skip ci]"
          git push
      - name: Print audit result
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib
          p=pathlib.Path('reports/latest/render_worker_env_audit/summary.json')
          if not p.exists():
              print('worker env audit summary missing')
              raise SystemExit(1)
          data=json.load(open(p, encoding='utf-8'))
          print(json.dumps(data, indent=2))
          raise SystemExit(0)
          PY
