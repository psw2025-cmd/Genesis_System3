name: Actions Truth Autopsy

on:
  workflow_run:
    workflows:
      - Dashboard Live UI Proof
      - Cloud Runtime Check
      - Global Safety CI
      - Genesis System3 Global Safety CI
      - System3 Full Auto Truth
    types:
      - completed

permissions:
  contents: read
  actions: read

env:
  GH_TOKEN: ${{ github.token }}
  RAW_DIR: reports/latest/actions_truth_autopsy/raw
  OUT_DIR: reports/latest/actions_truth_autopsy
  SOURCE_WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
  SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
  SOURCE_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}

jobs:
  autopsy:
    name: Download logs/artifacts, summarize, delete temp raw files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare folders
        run: |
          rm -rf "$RAW_DIR" "$OUT_DIR"
          mkdir -p "$RAW_DIR/artifacts" "$RAW_DIR/logs" "$OUT_DIR"

      - name: Download source run metadata and logs
        run: |
          gh run view "$SOURCE_RUN_ID" --json databaseId,displayTitle,event,status,conclusion,headSha,workflowName,url,createdAt,updatedAt \
            > "$RAW_DIR/run.json" || true
          gh run view "$SOURCE_RUN_ID" --log \
            > "$RAW_DIR/logs/workflow.log" || true

      - name: Download source run artifacts
        run: |
          gh run download "$SOURCE_RUN_ID" --dir "$RAW_DIR/artifacts" || true
          find "$RAW_DIR" -maxdepth 4 -type f | sort

      - name: Build compact sanitized autopsy and delete raw downloaded data
        run: |
          python tools/actions_truth_autopsy.py \
            --raw-root "$RAW_DIR" \
            --out "$OUT_DIR" \
            --delete-raw
          test ! -d "$RAW_DIR"

      - name: Upload compact autopsy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: actions-truth-autopsy-${{ github.event.workflow_run.run_number }}
          path: reports/latest/actions_truth_autopsy/
          retention-days: 3
