name: Proof Status Matrix

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/proof-status-matrix.yml
      - reports/latest/**
      - docs/project_control/**

permissions:
  contents: write

jobs:
  proof-status-matrix:
    name: Publish consolidated proof status matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build proof status matrix
        shell: bash
        run: |
          set -euo pipefail
          OUT="reports/latest/proof_status_matrix"
          rm -rf "$OUT"
          mkdir -p "$OUT"

          python - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          proofs = [
              {'name': 'master_status', 'path': 'docs/project_control/SYSTEM3_MASTER_STATUS.md', 'required': True},
              {'name': 'full_trading_pipeline_readiness', 'path': 'reports/latest/full_trading_pipeline_readiness/09_pipeline_gate_summary.json', 'required': True},
              {'name': 'repo_cleanliness', 'path': 'reports/latest/repo_cleanliness/05_cleanliness_summary.json', 'required': True},
              {'name': 'full_repo_scan_clean', 'path': 'reports/latest/full_repo_scan_clean/07_scan_clean_summary.json', 'required': True},
              {'name': 'entrypoint_classification', 'path': 'reports/latest/entrypoint_classification/entrypoint_classification_summary.json', 'required': True},
              {'name': 'model_backtest_readiness', 'path': 'reports/latest/model_backtest_readiness/06_model_backtest_summary.json', 'required': True},
              {'name': 'render_endpoint_proof', 'path': 'reports/latest/render_endpoint_proof/endpoint_summary.json', 'required': True},
              {'name': 'dashboard_endpoint_coverage', 'path': 'reports/latest/dashboard_endpoint_coverage/endpoint_coverage_summary.json', 'required': False},
              {'name': 'external_data_yahoo', 'path': 'reports/latest/external_data_yahoo/yahoo_data_summary.json', 'required': False},
              {'name': 'safe_dryrun_validation_execution', 'path': 'reports/latest/safe_dryrun_validation_execution/02_execution_summary.json', 'required': False},
          ]

          rows = []
          for proof in proofs:
              p = Path(proof['path'])
              item = dict(proof)
              item['exists'] = p.exists()
              item['bytes'] = p.stat().st_size if p.exists() else 0
              item['status'] = 'PUBLISHED' if p.exists() else 'PENDING'
              if p.exists() and p.suffix == '.json':
                  try:
                      data = json.loads(p.read_text(encoding='utf-8'))
                      item['json_keys'] = sorted(list(data.keys()))[:30]
                      if 'verdict' in data:
                          item['verdict'] = data.get('verdict')
                      if 'pass' in data:
                          item['pass'] = data.get('pass')
                      if 'trade_ready' in data:
                          item['trade_ready'] = data.get('trade_ready')
                  except Exception as exc:
                      item['json_error'] = repr(exc)
              rows.append(item)

          summary = {
              'generated_utc': datetime.now(timezone.utc).isoformat(),
              'published_count': sum(1 for r in rows if r['exists']),
              'pending_count': sum(1 for r in rows if not r['exists']),
              'required_missing_count': sum(1 for r in rows if r['required'] and not r['exists']),
              'optional_missing_count': sum(1 for r in rows if (not r['required']) and not r['exists']),
              'rows': rows,
              'mode': 'Analyzer/Paper only; live trading disabled',
          }

          out = Path('reports/latest/proof_status_matrix')
          out.mkdir(parents=True, exist_ok=True)
          (out / 'proof_status_matrix.json').write_text(json.dumps(summary, indent=2, sort_keys=True), encoding='utf-8')

          lines = ['# Proof Status Matrix', '', f"Generated UTC: {summary['generated_utc']}", '', f"Published: `{summary['published_count']}`", f"Pending: `{summary['pending_count']}`", f"Required missing: `{summary['required_missing_count']}`", f"Optional missing: `{summary['optional_missing_count']}`", '', '| Proof | Status | Required | Path |', '|---|---|---:|---|']
          for r in rows:
              lines.append(f"| `{r['name']}` | `{r['status']}` | `{r['required']}` | `{r['path']}` |")
          lines.append('')
          lines.append('Analyzer/Paper only. Live trading disabled.')
          (out / 'README.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

          cat "$OUT/README.md"

      - name: Commit proof status matrix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/proof_status_matrix
          if git diff --cached --quiet; then
            echo "No proof status matrix changes to commit."
          else
            git commit -m "audit: publish proof status matrix"
            git push
          fi
