name: System3 Render Worker Issue Proof

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/cloud_worker.py'
      - 'render.yaml'
      - '.github/workflows/system3-render-worker-issue-proof.yml'

permissions:
  contents: write

jobs:
  worker-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      LIVE_TRADING_ENABLED: '0'
      SYSTEM3_LIVE_TRADING_ALLOWED: '0'
      ANALYZE_MODE: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile worker
        run: python -m py_compile scripts/cloud_worker.py
      - name: Verify worker safety patch without claiming live runtime PASS
        run: |
          mkdir -p reports/latest/render_worker_issue_proof
          python - <<'PY'
          import json
          import pathlib
          from datetime import datetime, timezone

          worker = pathlib.Path('scripts/cloud_worker.py').read_text(encoding='utf-8')
          render = pathlib.Path('render.yaml').read_text(encoding='utf-8')
          checks = {
            'live_trading_forced_off': 'LIVE_TRADING_ENABLED", "0"' in worker and 'SYSTEM3_LIVE_TRADING_ALLOWED", "0"' in worker,
            'runtime_report_writer_present': 'render_worker_runtime' in worker and '_write_runtime_report()' in worker,
            'no_secret_printing_meta_only': '_secret_meta' in worker and 'sha256_8' in worker,
            'worker_push_token_backoff': 'WORKER_PUSH_AUTH_BACKOFF_S' in worker and 'backing off' in worker,
            'dhan_auth_backoff': 'DHAN_AUTH_BACKOFF_S' in worker and 'Dhan auth failure detected' in worker,
            'worker_declared_in_render': 'type: worker' in render and 'python scripts/cloud_worker.py' in render,
            'shared_env_group_declared': 'dhan-shared-credentials' in render and 'WORKER_PUSH_TOKEN' in render,
          }
          static_source_status = 'PASS' if all(checks.values()) else 'BLOCKED'
          # Static repository checks cannot prove the currently deployed Render worker,
          # its secret presence, Dhan authentication, push authentication, or runtime logs.
          status = 'BLOCKED_RUNTIME_PROOF_REQUIRED'
          blockers = []
          if static_source_status != 'PASS':
            blockers.append('One or more analyzer-safe source/configuration checks failed')
          blockers.extend([
            'Current deployed Render worker preflight PASS is not proven by this repository-only workflow',
            'Current Dhan authentication success is not proven',
            'Current worker-to-backend push authentication success is not proven',
          ])
          payload = {
            'generated_at': datetime.now(timezone.utc).isoformat(),
            'status': status,
            'static_source_status': static_source_status,
            'runtime_proof_current': False,
            'checks': checks,
            'blockers': blockers,
            'live_trading_enabled': False,
            'system3_live_trading_allowed': False,
            'analyze_mode': True,
            'live_order_routes_called': False,
            'production_grade_claim_allowed': False,
            'next_required_runtime_steps': [
              'Redeploy or restart the Render backend and worker when deployment capacity is available',
              'Confirm the worker preflight report/log is current and status PASS',
              'Confirm Dhan 401 responses are gone without exposing credentials',
              'Confirm worker push 401 responses are gone without exposing WORKER_PUSH_TOKEN',
            ],
          }
          out = pathlib.Path('reports/latest/render_worker_issue_proof')
          out.joinpath('summary.json').write_text(json.dumps(payload, indent=2), encoding='utf-8')
          lines = [
            '# Render Worker Issue Proof',
            '',
            f"Generated: {payload['generated_at']}",
            '',
            f"Overall status: **{status}**",
            '',
            f"Static source status: **{static_source_status}**",
            '',
            'Runtime proof current: `false`',
            '',
            'Production-grade claim allowed: `false`',
            '',
            '## Static checks',
            '',
            *[f'- {key}: {value}' for key, value in checks.items()],
            '',
            '## Runtime blockers',
            '',
            *[f'- {item}' for item in blockers],
            '',
            'Live trading remains OFF.',
            '',
          ]
          out.joinpath('summary.md').write_text('\n'.join(lines), encoding='utf-8')
          if static_source_status != 'PASS':
            raise SystemExit(1)
          PY
      - name: Validate analyzer safety and fail-closed claim fields
        if: always()
        run: |
          python - <<'PY'
          import json
          p = 'reports/latest/render_worker_issue_proof/summary.json'
          d = json.load(open(p, encoding='utf-8'))
          assert d['live_trading_enabled'] is False
          assert d['system3_live_trading_allowed'] is False
          assert d['analyze_mode'] is True
          assert d['live_order_routes_called'] is False
          assert d['runtime_proof_current'] is False
          assert d['production_grade_claim_allowed'] is False
          assert d['status'] != 'PASS'
          print(json.dumps({
            'status': d['status'],
            'static_source_status': d['static_source_status'],
            'runtime_proof_current': d['runtime_proof_current'],
            'production_grade_claim_allowed': d['production_grade_claim_allowed'],
          }, indent=2))
          PY
      - name: Commit proof report with conflict retry
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/latest/render_worker_issue_proof/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci(worker): publish render worker issue proof [skip ci]"
          if git push; then exit 0; fi
          git pull --rebase origin main
          git push
