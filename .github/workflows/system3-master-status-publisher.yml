name: System3 Master Status Publisher

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-master-status:
    name: Publish consolidated System3 status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build master status
        shell: bash
        run: |
          set -euo pipefail
          OUT="docs/project_control/SYSTEM3_MASTER_STATUS.md"
          mkdir -p docs/project_control

          python - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          def load_json(path):
              p = Path(path)
              if not p.exists():
                  return None
              try:
                  return json.loads(p.read_text(encoding='utf-8'))
              except Exception as exc:
                  return {'_error': str(exc)}

          pipeline = load_json('reports/latest/full_trading_pipeline_readiness/09_pipeline_gate_summary.json')
          clean = load_json('reports/latest/repo_cleanliness/05_cleanliness_summary.json')

          lines = []
          lines.append('# System3 Master Status')
          lines.append('')
          lines.append(f'Generated UTC: {datetime.now(timezone.utc).isoformat()}')
          lines.append('')
          lines.append('## Current verified status')
          lines.append('')

          if pipeline:
              lines.append('### Full trading pipeline readiness')
              lines.append('')
              lines.append(f"- Verdict: `{pipeline.get('verdict', 'UNKNOWN')}`")
              lines.append(f"- Trade ready: `{pipeline.get('trade_ready', False)}`")
              lines.append(f"- DhanHQ dependency present: `{pipeline.get('dhanhq_dependency_present', pipeline.get('dhanhq_dependency_present', 'UNKNOWN'))}`")
              blockers = pipeline.get('blockers', [])
              lines.append(f"- Blockers: `{len(blockers)}`")
              for b in blockers:
                  lines.append(f"  - `{b}`")
              lines.append('')
          else:
              lines.append('- Full trading pipeline readiness proof: `MISSING`')
              lines.append('')

          if clean:
              lines.append('### Repo cleanliness')
              lines.append('')
              lines.append(f"- Pass: `{clean.get('pass', False)}`")
              lines.append(f"- Forbidden secret-style files: `{clean.get('forbidden_secret_style_count', 'UNKNOWN')}`")
              lines.append(f"- Generated files pending cleanup: `{clean.get('auto_removable_generated_count', 'UNKNOWN')}`")
              lines.append('')
          else:
              lines.append('- Repo cleanliness proof: `MISSING`')
              lines.append('')

          lines.append('## Safety mode')
          lines.append('')
          lines.append('- Broker mode: `Dhan-only`')
          lines.append('- Live trading: `disabled unless separately proven and explicitly enabled`')
          lines.append('- Current recommendation: `Analyzer/Paper only`')
          lines.append('')

          Path('docs/project_control/SYSTEM3_MASTER_STATUS.md').write_text('\n'.join(lines), encoding='utf-8')
          PY

          cat "$OUT"

      - name: Commit master status
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/project_control/SYSTEM3_MASTER_STATUS.md
          if git diff --cached --quiet; then
            echo "No master status changes to commit."
          else
            git commit -m "docs: publish System3 master status"
            git push
          fi
