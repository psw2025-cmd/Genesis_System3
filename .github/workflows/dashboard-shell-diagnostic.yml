name: Dashboard Shell Diagnostic

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Dashboard Visible Issue Tracker"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: dashboard-shell-diagnostic
  cancel-in-progress: true

jobs:
  diagnose-shell:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANALYZE_MODE: "1"
      LIVE_TRADING_ENABLED: "0"
      SYSTEM3_LIVE_TRADING_ALLOWED: "0"
      DASHBOARD_BASE_URL: "https://genesis-system3-backend.onrender.com"
      DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install isolated Playwright runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .proof-node
          cat > .proof-node/package.json <<'JSON'
          {"name":"system3-dashboard-shell-proof","private":true,"version":"1.0.0","dependencies":{"playwright":"1.52.0"}}
          JSON
          npm install --prefix .proof-node --no-audit --no-fund
          .proof-node/node_modules/.bin/playwright install --with-deps chromium
          ln -sfn "$PWD/.proof-node/node_modules" node_modules

      - name: Run analyzer-safe shell diagnostic with bounded auth recovery
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            node tools/dashboard_shell_diagnostic.mjs
            result="$(python - <<'PY'
          import json
          from pathlib import Path
          d = json.loads(Path('reports/latest/dashboard_shell_diagnostic/summary.json').read_text())
          print(f"{d.get('status','BLOCKED')}|{d.get('blocker','UNKNOWN')}")
          PY
          )"
            status="${result%%|*}"
            blocker="${result#*|}"
            echo "shell proof attempt ${attempt}: status=${status} blocker=${blocker}"
            if [[ "$status" == "PASS" ]]; then
              break
            fi
            if [[ "$blocker" != "DASHBOARD_AUTH_NOT_PROVEN" && "$blocker" != "AUTHENTICATED_FRONTEND_UNAVAILABLE_AFTER_RETRIES" && "$blocker" != "RENDER_UI_UNAVAILABLE_AFTER_RETRIES" ]]; then
              break
            fi
            if [[ "$attempt" -lt 3 ]]; then
              sleep $((attempt * 12))
            fi
          done

      - name: Reject unsafe report fields
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path('reports/latest/dashboard_shell_diagnostic/summary.json')
          text = p.read_text(encoding='utf-8').lower()
          forbidden = ['api_key"', 'cookie"', 'authorization"', 'token"', 'secret"', 'response_body']
          hits = [x for x in forbidden if x in text]
          if hits:
              raise SystemExit(f'unsafe proof fields detected: {hits}')
          PY

      - name: Publish current diagnostic without rebasing stale evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          validate_report() {
            python - <<'PY'
          import json
          from pathlib import Path
          p = Path('reports/latest/dashboard_shell_diagnostic/summary.json')
          d = json.loads(p.read_text(encoding='utf-8'))
          assert d.get('live_trading_enabled') is False
          assert d.get('order_routes_called') is False
          assert d.get('production_grade_claim_allowed') is False
          text = p.read_text(encoding='utf-8').lower()
          forbidden = ['api_key"', 'cookie"', 'authorization"', 'token"', 'secret"', 'response_body']
          hits = [x for x in forbidden if x in text]
          if hits:
              raise SystemExit(f'unsafe proof fields detected: {hits}')
          PY
          }

          commit_report() {
            git add reports/latest/dashboard_shell_diagnostic/summary.json reports/latest/dashboard_shell_diagnostic/summary.md
            if git diff --cached --quiet; then
              return 2
            fi
            git commit -m "ci(proof): publish dashboard shell diagnostic [skip ci]"
          }

          validate_report
          if ! commit_report; then
            rc=$?
            if [[ "$rc" -eq 2 ]]; then exit 0; fi
            exit "$rc"
          fi
          if git push origin "HEAD:${GITHUB_REF_NAME}"; then
            exit 0
          fi

          # Another proof publisher moved main. Never rebase an already-generated
          # report: regenerate it against the newest proof tree, validate, and push.
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"
          node tools/dashboard_shell_diagnostic.mjs
          validate_report
          if ! commit_report; then
            rc=$?
            if [[ "$rc" -eq 2 ]]; then exit 0; fi
            exit "$rc"
          fi
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Enforce fail-closed result
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          d = json.loads(Path('reports/latest/dashboard_shell_diagnostic/summary.json').read_text())
          assert d['live_trading_enabled'] is False
          assert d['order_routes_called'] is False
          assert d['production_grade_claim_allowed'] is False
          if d['status'] != 'PASS':
              raise SystemExit(f"dashboard shell blocked: {d['blocker']}")
          PY