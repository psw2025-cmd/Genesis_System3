name: Dashboard Visible Issue Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/dashboard-visible-issue-tracker.yml'
      - 'tools/dashboard_visible_issue_tracker.mjs'
      - 'dashboard/frontend/**'
      - 'dashboard/backend/**'
  workflow_run:
    workflows:
      - Dashboard Visual Production Proof
      - System3 Public Truth Publish
      - System3 Parallel Root-Cause Audit
      - System3 Autopilot Proof Board
    types: [completed]

permissions:
  contents: write

concurrency:
  group: dashboard-visible-issue-tracker
  cancel-in-progress: false

jobs:
  visible-issue-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DASHBOARD_BASE_URL: https://genesis-system3-backend.onrender.com
      DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
      LIVE_TRADING_ENABLED: '0'
      SYSTEM3_LIVE_TRADING_ALLOWED: '0'
      ANALYZE_MODE: '1'
      EXPECTED_DASHBOARD_TAB_COUNT: '16'
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.proof-node/ms-playwright
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Verify analyzer-only safety flags
        run: |
          test "$ANALYZE_MODE" = "1"
          test "$LIVE_TRADING_ENABLED" = "0"
          test "$SYSTEM3_LIVE_TRADING_ALLOWED" = "0"

      - name: Remove previously committed visual proof
        run: |
          rm -rf reports/latest/dashboard_visible_issue_tracker
          mkdir -p reports/latest/dashboard_visible_issue_tracker

      - name: Install isolated dashboard proof dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .proof-node node_modules
          mkdir -p .proof-node

          retry() {
            local attempts="$1"
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$attempts" ]; then
                echo "Command failed after ${n} attempts" >&2
                return 1
              fi
              sleep_seconds=$((n * 10))
              echo "Attempt ${n} failed; retrying in ${sleep_seconds}s" >&2
              sleep "$sleep_seconds"
              n=$((n + 1))
            done
          }

          cd .proof-node
          npm init -y >/dev/null 2>&1
          retry 3 npm install --ignore-scripts --no-audit --no-fund --package-lock=false playwright@1.52.0
          retry 3 npx playwright install chromium
          cd ..

          test -d .proof-node/node_modules/playwright
          test -d "$PLAYWRIGHT_BROWSERS_PATH"
          ln -s .proof-node/node_modules node_modules
          node --input-type=module -e "import('playwright').then(m => { if (!m.chromium) process.exit(1) })"

      - name: Scan live dashboard visible issues
        id: scan
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: node tools/dashboard_visible_issue_tracker.mjs

      - name: Always create machine-readable blocked evidence
        if: always()
        shell: bash
        run: |
          mkdir -p reports/latest/dashboard_visible_issue_tracker
          if test -s reports/latest/dashboard_visible_issue_tracker/summary.json && test -s reports/latest/dashboard_visible_issue_tracker/summary.md; then
            exit 0
          fi
          INSTALL_OUTCOME='${{ steps.install.outcome }}' SCAN_OUTCOME='${{ steps.scan.outcome }}' python - <<'PY'
          import json, os
          from datetime import datetime, timezone

          out='reports/latest/dashboard_visible_issue_tracker'
          os.makedirs(out, exist_ok=True)
          install_outcome=os.environ.get('INSTALL_OUTCOME','unknown')
          scan_outcome=os.environ.get('SCAN_OUTCOME','unknown')
          expected_tabs=int(os.environ.get('EXPECTED_DASHBOARD_TAB_COUNT','16'))
          reason=(
              'visual tracker did not produce its required report; '
              f'install_step_outcome={install_outcome}; scan_step_outcome={scan_outcome}. '
              'Inspect isolated Playwright installation, browser launch, Render reachability, and authentication.'
          )
          data={
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'base': os.environ.get('DASHBOARD_BASE_URL',''),
              'status': 'BLOCKED',
              'auth': {'ok': False, 'status': 0, 'note': 'not proven because tracker report was not produced'},
              'tabs': [],
              'expected_tab_count': expected_tabs,
              'visible_issue_count': 0,
              'info_line_count': 0,
              'screenshot_missing_count': expected_tabs,
              'ui_exception_count': 1,
              'global_exception': reason,
              'visible_issues': [],
              'info_lines': [],
              'todo': [reason],
              'production_grade_claim_allowed': False,
              'analyzer_safety': {
                  'analyze_mode': os.environ.get('ANALYZE_MODE') == '1',
                  'live_trading_enabled': False,
                  'system3_live_trading_allowed': False,
              },
          }
          with open(f'{out}/summary.json','w',encoding='utf-8') as f:
              json.dump(data,f,indent=2)
          with open(f'{out}/summary.md','w',encoding='utf-8') as f:
              f.write('# Dashboard Visible Issue Tracker\n\n')
              f.write(f"Generated: {data['generated_at']}\n\n")
              f.write('Status: **BLOCKED**\n\n')
              f.write(f"Expected tab count: `{expected_tabs}`\n\n")
              f.write('Production-grade claim allowed: `false`\n\n')
              f.write('## Exact blocker\n\n')
              f.write(f'- {reason}\n')
          PY

      - name: Validate and sanitize report before publication
        if: always()
        env:
          PROOF_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
        run: |
          test -s reports/latest/dashboard_visible_issue_tracker/summary.json
          test -s reports/latest/dashboard_visible_issue_tracker/summary.md
          python - <<'PY'
          import json, os
          p='reports/latest/dashboard_visible_issue_tracker/summary.json'
          d=json.load(open(p, encoding='utf-8'))
          required=['generated_at','status','visible_issue_count','production_grade_claim_allowed','expected_tab_count','tabs']
          missing=[k for k in required if k not in d]
          if missing:
              raise SystemExit(f'missing report keys: {missing}')
          expected_tabs=int(os.environ.get('EXPECTED_DASHBOARD_TAB_COUNT','16'))
          if int(d.get('expected_tab_count') or 0) != expected_tabs:
              raise SystemExit(f'expected_tab_count must equal {expected_tabs}')
          scanned_tabs=len(d.get('tabs') or [])
          pass_eligible=(d.get('status') == 'PASS' and scanned_tabs == expected_tabs)
          if d.get('production_grade_claim_allowed') != pass_eligible:
              raise SystemExit('production_grade_claim_allowed requires PASS and complete tab coverage')
          auth=d.get('auth') if isinstance(d.get('auth'),dict) else {}
          safe_auth={'ok': bool(auth.get('ok')), 'status': int(auth.get('status') or 0)}
          if auth.get('note'):
              safe_auth['note']=str(auth.get('note'))[:300]
          d['auth']=safe_auth
          forbidden={'api_key','apikey','authorization','cookie','cookies','password','secret','session','token','access_token','refresh_token','text','body','response_body'}
          def scan(v,path='root'):
              hits=[]
              if isinstance(v,dict):
                  for k,x in v.items():
                      key=str(k).lower()
                      if key in forbidden or any(s in key for s in ('password','secret','token','cookie','authorization','api_key')):
                          hits.append(f'{path}.{k}')
                      hits.extend(scan(x,f'{path}.{k}'))
              elif isinstance(v,list):
                  for i,x in enumerate(v): hits.extend(scan(x,f'{path}[{i}]'))
              return hits
          hits=scan(d)
          if hits:
              raise SystemExit(f'proof report contains forbidden sensitive fields: {hits[:20]}')
          serialized=json.dumps(d,sort_keys=True)
          key=os.environ.get('PROOF_API_KEY','')
          if key and key in serialized:
              raise SystemExit('proof report contains the dashboard API key value')
          with open(p,'w',encoding='utf-8') as f: json.dump(d,f,indent=2)
          print(json.dumps({
              'status': d.get('status'),
              'expected_tab_count': d.get('expected_tab_count'),
              'scanned_tab_count': scanned_tabs,
              'visible_issue_count': d.get('visible_issue_count'),
              'screenshot_missing_count': d.get('screenshot_missing_count'),
              'ui_exception_count': d.get('ui_exception_count'),
              'auth_ok': bool(d.get('auth',{}).get('ok')),
              'production_grade_claim_allowed': d.get('production_grade_claim_allowed'),
          },indent=2))
          PY

      - name: Commit visible issue report with conflict retry
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/latest/dashboard_visible_issue_tracker/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ci(proof): publish dashboard visible issue tracker [skip ci]"
          if git push; then exit 0; fi
          git pull --rebase origin main
          git push

      - name: Enforce no visible UI blockers
        run: |
          python - <<'PY'
          import json, os
          p='reports/latest/dashboard_visible_issue_tracker/summary.json'
          d=json.load(open(p,encoding='utf-8'))
          expected_tabs=int(os.environ.get('EXPECTED_DASHBOARD_TAB_COUNT','16'))
          scanned_tabs=len(d.get('tabs') or [])
          print(json.dumps({
              'status': d.get('status'),
              'expected_tab_count': expected_tabs,
              'scanned_tab_count': scanned_tabs,
              'visible_issue_count': d.get('visible_issue_count'),
              'screenshot_missing_count': d.get('screenshot_missing_count'),
              'ui_exception_count': d.get('ui_exception_count'),
              'auth_ok': bool(d.get('auth',{}).get('ok')),
              'production_grade_claim_allowed': d.get('production_grade_claim_allowed'),
          },indent=2))
          passed=(
              d.get('status') == 'PASS'
              and scanned_tabs == expected_tabs
              and d.get('production_grade_claim_allowed') is True
          )
          raise SystemExit(0 if passed else 1)
          PY