name: System3 PR Build Proof

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  dashboard-build-proof:
    name: Dashboard clean install and build proof
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare proof folder
        shell: bash
        run: |
          mkdir -p reports/pr-build-proof
          date -u +%Y-%m-%dT%H:%M:%SZ > reports/pr-build-proof/generated_utc.txt

      - name: Install frontend dependencies
        shell: bash
        run: |
          cd dashboard/frontend
          npm ci | tee ../../reports/pr-build-proof/npm_ci.log

      - name: Build frontend
        shell: bash
        run: |
          cd dashboard/frontend
          npm run build | tee ../../reports/pr-build-proof/npm_build.log
          echo FRONTEND_BUILD_PASS > ../../reports/pr-build-proof/frontend_build_status.txt

      - name: Upload build proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: system3-pr-build-proof
          path: reports/pr-build-proof
          if-no-files-found: error
