name: Render Deploy Commit Proof

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - tools/render_deploy_commit_proof.py
      - .github/workflows/render-deploy-commit-proof.yml

permissions:
  contents: write

concurrency:
  group: render-deploy-commit-proof
  cancel-in-progress: true

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANALYZE_MODE: '1'
      LIVE_TRADING_ENABLED: '0'
      SYSTEM3_LIVE_TRADING_ALLOWED: '0'
      DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run analyzer-safe deploy proof
        id: proof
        continue-on-error: true
        run: python tools/render_deploy_commit_proof.py

      - name: Publish sanitized proof
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/render_deploy_commit_proof/summary.json reports/latest/render_deploy_commit_proof/summary.md
          if git diff --cached --quiet; then
            echo "No report change"
            exit 0
          fi
          git commit -m "ci(proof): publish Render deploy commit evidence [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Enforce fail-closed result
        if: steps.proof.outcome != 'success'
        run: exit 1
