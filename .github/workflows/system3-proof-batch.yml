name: System3 Proof Batch

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: system3-proof-batch
  cancel-in-progress: false

jobs:
  proof-batch:
    name: Run proof-first batch for Issues 24/26/27/28
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Genesis_System3
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show safe context
        shell: bash
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF_NAME"
          echo "Commit: $GITHUB_SHA"
          echo "Mode: Analyzer/Paper proof only"
          echo "No broker login, no live trading, no deletion"

      - name: Run System3 proof batch
        shell: bash
        run: |
          python scripts/system3_issue_24_26_27_28_proof_batch.py | tee reports/latest/system3_proof_batch_console.log

      - name: List generated proof outputs
        shell: bash
        run: |
          echo "=== reports/latest ==="
          find reports/latest -maxdepth 3 -type f | sort
          echo "=== proof ZIPs ==="
          find reports/latest -maxdepth 1 -name 'system3_proof_pack_*.zip' -type f -ls || true

      - name: Upload proof artifact ZIP
        uses: actions/upload-artifact@v4
        with:
          name: system3-proof-pack
          path: |
            reports/latest/system3_proof_pack_*.zip
            reports/latest/system3_proof_batch_console.log
            reports/latest/repo_authority/**
            reports/latest/performance_benchmark/**
            reports/latest/lifecycle_reconciliation/**
            reports/latest/dashboard_browser_api_proof/**
            reports/latest/implementation_batch/**
          if-no-files-found: error
          retention-days: 14

      - name: Commit generated proof reports back to repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/repo_authority reports/latest/performance_benchmark reports/latest/lifecycle_reconciliation reports/latest/dashboard_browser_api_proof reports/latest/implementation_batch reports/latest/system3_proof_batch_console.log
          git add reports/archive/repo_authority reports/archive/performance_benchmark reports/archive/lifecycle_reconciliation reports/archive/dashboard_browser_api_proof reports/archive/implementation_batch || true
          if git diff --cached --quiet; then
            echo "No generated proof report changes to commit."
          else
            git commit -m "audit: publish System3 proof batch outputs"
            git push
          fi

      - name: Final status summary
        shell: bash
        run: |
          echo "Proof batch workflow completed."
          echo "Check artifact: system3-proof-pack"
          test -f reports/latest/implementation_batch/status_matrix.json && cat reports/latest/implementation_batch/status_matrix.json || true
