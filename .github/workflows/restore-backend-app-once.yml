name: One-time Restore Backend App

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/restore-backend-app-once.yml

permissions:
  contents: write

jobs:
  restore-backend-app:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout full repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore dashboard/backend/app.py from last good commit
        shell: bash
        run: |
          set -euo pipefail
          GOOD_COMMIT="4d27762015a6fd2375bc38bd7e7a6df7791c1ba9"
          git checkout "$GOOD_COMMIT" -- dashboard/backend/app.py
          RESTORED_LINES="$(wc -l < dashboard/backend/app.py)"
          echo "RESTORED_LINES=$RESTORED_LINES"
          test "$RESTORED_LINES" -gt 3000
          git diff -- dashboard/backend/app.py | head -80 || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/backend/app.py
          if git diff --cached --quiet; then
            echo "No restore needed"
          else
            git commit -m "restore: recover full backend app.py"
            git push
          fi
