name: System3 Windows Self-Hosted Full Proof

on:
  workflow_dispatch:
  schedule:
    - cron: '15,45 * * * *'
  push:
    branches: [ main ]
    paths:
      - 'tools/system3_windows_self_hosted_full_system_proof.py'
      - '.github/workflows/system3-windows-self-hosted-full-proof.yml'
      - 'tools/**'
      - 'scripts/**'
      - 'dashboard/**'

permissions:
  contents: write
  actions: read

concurrency:
  group: system3-windows-self-hosted-full-proof
  cancel-in-progress: true

jobs:
  full-system-proof:
    name: Full system proof on Windows self-hosted
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 45
    env:
      LIVE_TRADING_ENABLED: '0'
      SYSTEM3_LIVE_TRADING_ALLOWED: '0'
      ANALYZE_MODE: '1'
      DASHBOARD_BASE_URL: ${{ secrets.DASHBOARD_BASE_URL || 'https://genesis-system3-backend.onrender.com' }}
      SYSTEM3_API_BASE: ${{ secrets.DASHBOARD_BASE_URL || 'https://genesis-system3-backend.onrender.com' }}
      DASHBOARD_API_KEY: ${{ secrets.DASHBOARD_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner identity
        shell: pwsh
        run: |
          Write-Host "RUNNER_OS=$env:RUNNER_OS"
          Write-Host "RUNNER_ARCH=$env:RUNNER_ARCH"
          Write-Host "COMPUTERNAME=$env:COMPUTERNAME"
          python --version
          node --version
          git --version

      - name: Install Python dependencies safely
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { python -m pip install -r requirements.txt }
          python -m pip install requests playwright

      - name: Install frontend dependencies when package exists
        shell: pwsh
        run: |
          if (Test-Path dashboard/frontend/package.json) {
            Push-Location dashboard/frontend
            npm install
            Pop-Location
          }

      - name: Install Playwright Chromium
        shell: pwsh
        run: |
          python -m playwright install chromium

      - name: Run Windows full-system proof board
        shell: pwsh
        run: |
          python tools/system3_windows_self_hosted_full_system_proof.py
        continue-on-error: true

      - name: Commit proof reports
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/windows_self_hosted_full_system_proof/
          if (git diff --cached --quiet) {
            Write-Host "No proof report changes to commit"
            exit 0
          }
          git commit -m "proof(windows): publish full self-hosted system proof [skip ci]"
          git push

      - name: Upload HTML proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-self-hosted-full-system-proof
          path: reports/latest/windows_self_hosted_full_system_proof/
          if-no-files-found: error

      - name: Enforce proof status
        shell: pwsh
        run: |
          $summary = Get-Content reports/latest/windows_self_hosted_full_system_proof/summary.json -Raw | ConvertFrom-Json
          Write-Host "Final status: $($summary.status)"
          if ($summary.status -ne "PASS") {
            Write-Host "Proof remains blocked. This is correct until all gates and UI are green."
            exit 1
          }
