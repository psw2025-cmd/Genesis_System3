name: Full QA Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 2 * * *"   # runs daily at 2 AM

jobs:
  qa-checks:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install lightgbm catboost xgboost tensorflow torch scikit-learn bandit safety pylint black plotly smartapi-python
        npm install -g eslint prettier depcruise dockerfilelint kubeval

    - name: Run Full QA Script
      run: |
        pwsh ./Run-FullQA.ps1

    - name: Archive QA Proof Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qa-proof-logs
        path: C:\Genesis_System3\logs\inspector
