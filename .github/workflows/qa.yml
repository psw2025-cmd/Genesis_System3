name: Full QA Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 2 * * *"   # runs daily at 2 AM

jobs:
  qa-checks:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: |
          requirements-ci.txt
          .github/workflows/qa.yml

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Cache npm package downloads
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\npm-cache
        key: ${{ runner.os }}-npm-global-${{ hashFiles('package.json', 'package-lock.json', '.github/workflows/qa.yml') }}
        restore-keys: |
          ${{ runner.os }}-npm-global-

    - name: Install dependencies
      timeout-minutes: 20
      run: |
        python -m pip install --timeout 60 --retries 3 --upgrade pip setuptools wheel
        python -m pip install --timeout 60 --retries 3 lightgbm catboost xgboost tensorflow torch scikit-learn bandit safety pylint black plotly smartapi-python
        npm install -g eslint prettier depcruise dockerfilelint --cache "$env:LOCALAPPDATA\npm-cache"

    - name: Run Full QA Script report only
      continue-on-error: true
      run: |
        pwsh ./Run-FullQA.ps1

    - name: Archive QA Proof Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qa-proof-logs
        path: C:\Genesis_System3\logs\inspector
