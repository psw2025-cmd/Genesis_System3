name: Full QA Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  qa-legacy-report:
    name: REPORT ONLY - Full QA legacy findings
    runs-on: windows-latest
    timeout-minutes: 45
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies report only
        timeout-minutes: 20
        continue-on-error: true
        shell: pwsh
        run: |
          python -m pip install --timeout 60 --retries 3 --upgrade pip setuptools wheel
          python -m pip install --timeout 60 --retries 3 lightgbm catboost xgboost tensorflow torch scikit-learn bandit safety pylint black plotly dhanhq
          npm install -g eslint prettier depcruise dockerfilelint --cache "$env:LOCALAPPDATA\npm-cache"

      - name: Run Full QA Script report only
        continue-on-error: true
        shell: pwsh
        run: |
          Write-Host "=== REPORT ONLY: Full QA legacy script ==="
          Write-Host "Architecture/trading safety gate is the blocking gate. Legacy QA is visible but temporary report-only."
          if (Test-Path "./Run-FullQA.ps1") {
            pwsh ./Run-FullQA.ps1
          } else {
            Write-Host "Run-FullQA.ps1 not found. REPORT_ONLY."
          }

      - name: Write QA truth summary
        if: always()
        shell: pwsh
        run: |
          "## Full QA Pipeline Truth" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Mode: REPORT_ONLY legacy QA" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Blocking rule: architecture and trading safety must be full PASS" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Temporary rule: legacy cleanup remains report-only until fixed in batches" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          "- Protected: trading logic, broker, .env, DB, model artifacts" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
