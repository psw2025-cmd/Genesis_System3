name: CD - Deploy Backend & Dashboard to Azure

on:
  workflow_dispatch:
    inputs:
      confirm_azure_deploy:
        description: Type YES to run legacy Azure deploy manually
        required: true
        default: "NO"

permissions:
  contents: read
  packages: write

jobs:
  detect-deployable-artifacts:
    if: ${{ github.event.inputs.confirm_azure_deploy == 'YES' }}
    runs-on: ubuntu-latest
    outputs:
      backend_ready: ${{ steps.detect.outputs.backend_ready }}
      dashboard_ready: ${{ steps.detect.outputs.dashboard_ready }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Docker build inputs
        id: detect
        run: |
          echo "Azure auto-deploy is disabled. Render is the active deployment target."
          if [ -f dashboard/backend/Dockerfile ]; then
            echo "backend_ready=true" >> "$GITHUB_OUTPUT"
            echo "dashboard/backend/Dockerfile found. Backend deploy enabled."
          else
            echo "backend_ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::dashboard/backend/Dockerfile not found. Backend deploy skipped."
          fi

          if [ -f dashboard/Dockerfile ]; then
            echo "dashboard_ready=true" >> "$GITHUB_OUTPUT"
            echo "dashboard/Dockerfile found. Dashboard deploy enabled."
          else
            echo "dashboard_ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::dashboard/Dockerfile not found. Dashboard deploy skipped."
          fi

  deploy-backend:
    needs: detect-deployable-artifacts
    if: ${{ github.event.inputs.confirm_azure_deploy == 'YES' && needs.detect-deployable-artifacts.outputs.backend_ready == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend Image
        run: |
          docker build -t ghcr.io/psw2025-cmd/genesis_system3/genesis-backend:latest -f dashboard/backend/Dockerfile .
          docker push ghcr.io/psw2025-cmd/genesis_system3/genesis-backend:latest

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: genesis-backend-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          images: ghcr.io/psw2025-cmd/genesis_system3/genesis-backend:latest

  deploy-dashboard:
    needs: detect-deployable-artifacts
    if: ${{ github.event.inputs.confirm_azure_deploy == 'YES' && needs.detect-deployable-artifacts.outputs.dashboard_ready == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Dashboard Image
        run: |
          docker build -t ghcr.io/psw2025-cmd/genesis_system3/genesis-dashboard:latest -f dashboard/Dockerfile .
          docker push ghcr.io/psw2025-cmd/genesis_system3/genesis-dashboard:latest

      - name: Deploy Dashboard to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: genesis-dashboard-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DASHBOARD }}
          images: ghcr.io/psw2025-cmd/genesis_system3/genesis-dashboard:latest
