name: Ultra Dashboard Tabs Proof

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/ultra-dashboard-tabs-proof.yml
      - dashboard/frontend/**

permissions:
  contents: read

jobs:
  proof:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/frontend/package-lock.json
      - name: Capture actual frontend tabs
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$GITHUB_WORKSPACE"
          OUT="$ROOT/reports/latest/ultra_dashboard_tabs_proof"
          mkdir -p "$OUT"
          cd "$ROOT/dashboard/frontend"
          npm ci
          npm run build
          npm install --no-save playwright
          npx playwright install --with-deps chromium
          nohup npm run preview -- --host 127.0.0.1 --port 4173 > "$OUT/vite_preview.log" 2>&1 &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do curl -fsS http://127.0.0.1:4173 >/dev/null 2>&1 && break || sleep 1; done
          OUT_DIR="$OUT" node --input-type=module <<'NODE'
          import fs from 'fs';
          import path from 'path';
          import { chromium } from 'playwright';
          const out = process.env.OUT_DIR;
          const base = 'http://127.0.0.1:4173';
          const routes = [
            ['Overview','/','01_overview.png'],['Chain','/chain','02_chain.png'],['Signals','/signals','03_signals.png'],
            ['Trading','/trading','04_trading.png'],['Backtest','/backtest','05_backtest.png'],['Alerts','/alerts','06_alerts.png'],
            ['Risk','/risk','07_risk.png'],['Charts','/charts','08_charts.png'],['ML','/ml','09_ml.png'],
            ['Model','/model','10_model.png'],['Control','/control','11_control.png'],['Agent','/agent','12_agent.png']
          ];
          const browser = await chromium.launch({headless:true});
          const page = await browser.newPage({viewport:{width:1440,height:1100}});
          const results = [];
          for (const [name, route, file] of routes) {
            const url = base + route;
            const p = path.join(out, file);
            let row = {name, route, url, screenshot:file, pass:false};
            try {
              const response = await page.goto(url, {waitUntil:'domcontentloaded', timeout:60000});
              await page.waitForTimeout(2500);
              await page.screenshot({path:p, fullPage:true});
              const body = (await page.locator('body').innerText({timeout:10000})).slice(0,1200);
              const size = fs.existsSync(p) ? fs.statSync(p).size : 0;
              row = {name, route, url, http_status: response?.status() ?? null, title: await page.title(), screenshot:file, size_bytes:size, body_text_sample:body, pass:Boolean(response && response.status()<400 && size>20000 && body.trim())};
            } catch(e) { row.error = String(e).slice(0,300); }
            results.push(row);
          }
          await browser.close();
          const all = results.every(r => r.pass);
          fs.writeFileSync(path.join(out,'summary.json'), JSON.stringify({mockup:false, source:'actual dashboard/frontend React Vite app', verdict: all?'ALL_TABS_PROVEN':'NOT_ALL_TABS_PROVEN', all_tabs_visual_proof:all, results}, null, 2));
          let md = '# Ultra Dashboard Actual Tab Screenshots\n\nMockup: `false`\n\n';
          for (const r of results) md += `## ${r.name}\n\nRoute: \`${r.route}\` Pass: \`${r.pass}\`\n\n![${r.name}](./${r.screenshot})\n\n`;
          fs.writeFileSync(path.join(out,'00_index.md'), md);
          if (!all) process.exit(1);
          NODE
          cd "$ROOT/reports/latest"
          zip -r ultra_dashboard_tabs_proof.zip ultra_dashboard_tabs_proof
          ls -lh "$OUT"
          du -h ultra_dashboard_tabs_proof.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ultra-dashboard-tabs-proof
          path: |
            reports/latest/ultra_dashboard_tabs_proof
            reports/latest/ultra_dashboard_tabs_proof.zip
          if-no-files-found: error
