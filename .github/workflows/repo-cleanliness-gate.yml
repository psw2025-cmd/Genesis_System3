name: Repo Cleanliness Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/repo-cleanliness-gate.yml
      - .gitignore
      - docs/project_control/**

permissions:
  contents: write

concurrency:
  group: repo-cleanliness-proof-main
  cancel-in-progress: false

jobs:
  repo-cleanliness-gate:
    name: Check repo cleanliness and publish proof
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build cleanliness proof
        shell: bash
        run: |
          set -euo pipefail
          OUT="reports/latest/repo_cleanliness"
          rm -rf "$OUT"
          mkdir -p "$OUT"

          {
            echo "# Repo Cleanliness Gate"
            echo "Generated UTC: $(date -u --iso-8601=seconds)"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Rule: delete generated/unsafe files automatically; source duplicates require proof-first classification."
          } > "$OUT/00_summary.md"

          git ls-files > /tmp/tracked_files.txt

          {
            echo "# Automatically removable tracked files"
            grep -E '(^|/)audit_artifacts/|(^|/)__pycache__/|\.pyc$|(^|/)desktop\.ini$|(^|/)\.DS_Store$|(^|/)\.pytest_cache/' /tmp/tracked_files.txt || true
          } > "$OUT/01_auto_removable_generated_files.txt"

          {
            echo "# Forbidden secret-style tracked files"
            grep -E '(^|/)\.env($|\.)|(^|/)config/\.env($|\.)|\.pem$|\.p8$|\.p12$|\.pfx$|(^|/)id_rsa$|(^|/)id_ed25519$' /tmp/tracked_files.txt | grep -vE '(^|/)\.env\.example$|(^|/)config/\.env\.example$' || true
          } > "$OUT/02_forbidden_secret_style_files.txt"

          {
            echo "# Duplicate basename groups - source review candidates"
            find . -path ./.git -prune -o -type f -printf '%f\t%p\n' | sort | awk -F '\t' '{count[$1]++; paths[$1]=paths[$1]"\n  "$2} END {for (n in count) if (count[n]>1) print n" ("count[n]")" paths[n]"\n"}' | sort | head -2000 || true
          } > "$OUT/03_duplicate_basename_candidates.txt"

          {
            echo "# Old/backup/quarantine/copy-like paths - source review candidates, not auto-delete"
            grep -Ei '(^|/)(old|backup|bak|archive|quarantine|copy|duplicate|temp|tmp)(/|_|-|\.)|(_old|_backup|_bak|_copy|_duplicate)\.' /tmp/tracked_files.txt | sort | head -2000 || true
          } > "$OUT/04_old_backup_copy_candidates.txt"

          python - <<'PY' > "$OUT/05_cleanliness_summary.json"
          import json, re, subprocess
          files = subprocess.check_output(['git','ls-files'], text=True).splitlines()
          auto = [p for p in files if re.search(r'(^|/)audit_artifacts/|(^|/)__pycache__/|\.pyc$|(^|/)desktop\.ini$|(^|/)\.DS_Store$|(^|/)\.pytest_cache/', p)]
          forbidden = []
          for p in files:
              if p in ('.env.example', 'config/.env.example'):
                  continue
              if re.search(r'(^|/)\.env($|\.)|(^|/)config/\.env($|\.)|\.pem$|\.p8$|\.p12$|\.pfx$|(^|/)id_rsa$|(^|/)id_ed25519$', p):
                  forbidden.append(p)
          review = [p for p in files if re.search(r'(^|/)(old|backup|bak|archive|quarantine|copy|duplicate|temp|tmp)(/|_|-|\.)|(_old|_backup|_bak|_copy|_duplicate)\.', p, re.I)]
          result = {
            'tracked_file_count': len(files),
            'auto_removable_generated_count': len(auto),
            'forbidden_secret_style_count': len(forbidden),
            'old_backup_copy_review_candidate_count': len(review),
            'auto_delete_allowed_for_generated_only': True,
            'source_delete_requires_runtime_proof': True,
            'pass': len(auto) == 0 and len(forbidden) == 0,
          }
          print(json.dumps(result, indent=2, sort_keys=True))
          PY

          cat "$OUT/05_cleanliness_summary.json"

      - name: Commit latest cleanliness proof
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/latest/repo_cleanliness
          if git diff --cached --quiet; then
            echo "No cleanliness proof changes to commit."
            exit 0
          fi
          git commit -m "audit: publish latest repo cleanliness proof"
          git pull --rebase origin main
          git push origin HEAD:main
