  #       value: analyzer
  #     - key: ANALYZE_MODE
  #       value: "1"
  #     - key: LIVE_TRADING_ENABLED
  #       value: "0"
  #     - key: SYSTEM3_LIVE_TRADING_ALLOWED
  #       value: "0"
  #     # Staging should run with synthetic/test credentials, not real
  #     # Dhan production creds - set separately in Render's dashboard
  #     # for this service once created.
