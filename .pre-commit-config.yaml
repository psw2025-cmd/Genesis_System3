repos:
  # Code formatting & linting
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        args: [--check, --diff]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--check-only, --profile, black]

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        # Gate on Medium+ severity only. Low-severity findings here are
        # pervasive pre-existing stylistic patterns (broad except/continue,
        # subprocess/pickle import notices) tracked separately as backlog,
        # not exploitable issues in this codebase's trust model.
        args: [-r, core, -ll]
        pass_filenames: false

  # NOTE: pyupio/safety removed login-less open-source-database scanning
  # (now requires a Safety CLI account/login), which breaks it as a free,
  # no-login local pre-commit hook. Dropped in favor of pip-audit below,
  # which covers the same dependency-vulnerability-scanning purpose and
  # remains genuinely free with no account required.
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        args:
          - --requirement
          - requirements_runtime.txt
          - --requirement
          - requirements-dev.txt

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy

  # Testing (pytest)
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest --maxfail=1 --disable-warnings -q
        language: system
        types: [python]

  # Documentation linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        files: \.yaml$

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        files: Dockerfile

  # JSON validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-json
