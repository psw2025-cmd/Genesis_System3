# Oracle VM deployment compose file for Genesis System3.
# Intended to run on an Oracle Cloud VM through a GitHub self-hosted runner.
# Safe default: backend container only. Dashboard can be added after its active Dockerfile/path is proven.

services:
  genesis-backend:
    image: ghcr.io/psw2025-cmd/genesis_system3/genesis-backend:latest
    container_name: genesis-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SYSTEM3_DEPLOY_TARGET: oracle-vm
      SYSTEM3_MODE: analyzer
      ANALYZE_MODE: "1"
      LIVE_TRADING_ENABLED: "0"
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000', timeout=5)\nprint('backend ok')\nPY"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  default:
    name: genesis-system3-oracle
